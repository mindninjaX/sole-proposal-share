     re-projection of real geometry for drag-to-rotate / scroll-to-zoom. -->

  *, *::before, *::after { box-sizing: border-box; }

    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;

  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type="number"] { -moz-appearance: textfield; appearance: textfield; }

  /* === Hover states (inline styles can't express :hover) ==================== */
  button[data-btn]:not(:disabled) { transition: background 0.12s, border-color 0.12s, color 0.12s, box-shadow 0.12s, transform 0.05s; }
  button[data-btn]:not(:disabled):active { transform: translateY(0.5px); }
  button[data-btn="ghost"]:not(:disabled):hover         { background: #F9FAFB; border-color: #D1D5DB; }
  button[data-btn="soft"]:not(:disabled):hover          { background: #EEF0FF; border-color: #C7C9FB; }
  button[data-btn="primary"]:not(:disabled):hover       { background: #4F46E5; border-color: #4F46E5; box-shadow: 0 2px 8px rgba(79, 70, 229, 0.25); }
  button[data-btn="primaryOutline"]:not(:disabled):hover{ background: #EEF0FF; }
  button[data-btn="iconOnly"]:not(:disabled):hover      { background: #F3F4F6; }
  button[data-btn="danger"]:not(:disabled):hover        { background: #DC2626; border-color: #DC2626; }
  button[data-btn="light"]:not(:disabled):hover         { background: #F3F4F6; }

  button[data-hover="row"]:not(:disabled)               { transition: background 0.1s; }
  button[data-hover="row"]:not(:disabled):hover         { background: #F9FAFB; }
  button[data-hover="kpi"]:not(:disabled),
  button[data-hover="tile"]:not(:disabled) {
    transition: transform 0.12s ease, box-shadow 0.12s ease, border-color 0.12s ease, background 0.12s ease;
  }
  button[data-hover="kpi"]:not(:disabled):hover {
    transform: translateY(-1px);
    border-color: #C7C9FB;
    box-shadow: 0 6px 16px -8px rgba(91, 91, 246, 0.28), 0 1px 2px rgba(15, 17, 23, 0.04);
  }
  button[data-hover="tile"]:not(:disabled):hover {
    border-color: #C7C9FB;
    background: #F5F6FF;
  }
  button[data-chip]:not(:disabled):not([data-selected="true"]):hover {
    background: #F9FAFB; border-color: #D1D5DB; color: #1F2937;
  }
  .scroll-area { overflow-y: auto; }
  .scroll-area::-webkit-scrollbar { width: 8px; height: 8px; }
  .scroll-area::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 4px; }
  .scroll-area::-webkit-scrollbar-track { background: transparent; }

  @keyframes slidein { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
  @keyframes expand { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes flash {
    0%   { box-shadow: 0 0 0 0 rgba(91, 91, 246, 0);   border-color: #C7C9FB; }
    25%  { box-shadow: 0 0 0 7px rgba(91, 91, 246, 0.16); border-color: #5B5BF6; }
    100% { box-shadow: 0 0 0 0 rgba(91, 91, 246, 0);   border-color: #C7C9FB; }
  }
  @keyframes pulseDot {
    0%, 100% { opacity: 0.35; transform: scale(0.8); }
    50%      { opacity: 1;    transform: scale(1.2); }
  }
  @keyframes bubblepop { from { opacity: 0; transform: scale(0.4); } to { opacity: 1; transform: scale(1); } }

  /* Range slider — clean track (filled via inline gradient) + thumb. */
  input[type="range"].dl-range { -webkit-appearance: none; appearance: none; height: 6px; border-radius: 999px; outline: none; cursor: pointer; }
  input[type="range"].dl-range::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #fff; border: 2px solid #5B5BF6; box-shadow: 0 1px 3px rgba(15,17,23,0.25); cursor: pointer; }
  input[type="range"].dl-range::-moz-range-thumb { width: 18px; height: 18px; border-radius: 50%; background: #fff; border: 2px solid #5B5BF6; box-shadow: 0 1px 3px rgba(15,17,23,0.25); cursor: pointer; }
  input[type="range"].dl-range.on-brand::-webkit-slider-thumb { border-color: #fff; }
  input[type="range"].dl-range.on-brand::-moz-range-thumb { border-color: #fff; }
  .tpl-num { font-variant-numeric: tabular-nums slashed-zero; }
</style>

<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, Fragment } = React;

// ============================================================================
// Sole × BOQ — banking & lending sales-pitch demo.
// A self-contained click-through for Bank of Queensland's exec team showing how
// a BOQ partnership lives inside Sole's small-business accounting app. No
// backend; all data is mocked. Design language copied from prototype/index.html
// (the `T` tokens, atoms, inline-SVG charts).
// ============================================================================

// --- design tokens (verbatim from index.html) ---
const T = {
  primary: '#5B5BF6',
  primaryDark: '#4F46E5',
  primarySoft: '#EEF0FF',
  primarySofter: '#F5F6FF',
  bg: '#F5F4F8',
  card: '#FFFFFF',
  border: '#E5E7EB',
  borderStrong: '#D1D5DB',
  text: '#0F1117',
  textSoft: '#1F2937',
  muted: '#6B7280',
  mutedSoft: '#9CA3AF',
  fieldBg: '#F9FAFB',
  green: '#10B981',
  greenDark: '#059669',
  greenSoft: '#ECFDF5',
  amber: '#D97706',
  amberSoft: '#FEF3C7',
  red: '#EF4444',
  redSoft: '#FEE2E2',
  blue: '#3B82F6',
  blueSoft: '#EFF6FF',
};

// BOQ co-brand palette (navy + teal — distinct from Sole's indigo).
const BOQ = { navy: '#0E2A47', teal: '#0FA39A', soft: '#E6F6F4' };

const PD = { spark: T.primary, rowGap: 16 };

// --- colour helpers (verbatim) ---
const hexMix = (hex, towards, ratio) => {
  if (!hex || typeof hex !== 'string') return hex;
  const h = hex.replace('#', '');
  if (h.length !== 6) return hex;
  const r = parseInt(h.slice(0, 2), 16);
  const g = parseInt(h.slice(2, 4), 16);
  const b = parseInt(h.slice(4, 6), 16);
  const tr = parseInt(towards.slice(1, 3), 16);
  const tg = parseInt(towards.slice(3, 5), 16);
  const tb = parseInt(towards.slice(5, 7), 16);
  const mix = (a, c) => Math.round(a + (c - a) * ratio);
  const toHex = n => n.toString(16).padStart(2, '0');
  return `#${toHex(mix(r, tr))}${toHex(mix(g, tg))}${toHex(mix(b, tb))}`;
};
const withAlpha = (hex, alpha) => {
  if (!hex || typeof hex !== 'string') return hex;
  const h = hex.replace('#', '');
  if (h.length !== 6) return hex;
  const a = Math.round(Math.max(0, Math.min(1, alpha)) * 255).toString(16).padStart(2, '0');
  return `#${h}${a}`;
};

// --- money / finance helpers ---
const fmtMoney = (n, cents = false) =>
  `$${Number(n || 0).toLocaleString('en-AU', cents
    ? { minimumFractionDigits: 2, maximumFractionDigits: 2 }
    : { maximumFractionDigits: 0 })}`;

// Indicative monthly repayment for a principal at an annual rate over N years.
const estMonthly = (P, annualRate = 0.089, years = 5) => {
  if (!P || P <= 0) return 0;
  const r = annualRate / 12, n = years * 12;
  return Math.round((P * r) / (1 - Math.pow(1 + r, -n)));
};

// Density → indigo tint. Zero renders as a neutral field colour; a floor keeps
// small-but-nonzero values visibly tinted (so 1 job reads differently from 0).
const heatColor = (count, max) => {
  if (!count || count <= 0) return T.fieldBg;
  const t = 0.18 + 0.82 * Math.min(1, count / (max || 1));
  return hexMix(T.primarySoft, T.primary, t);
};
// Bubble radius — area roughly proportional to volume (sqrt scaling).
const bubbleR = (count, max) => 12 + Math.sqrt(Math.min(1, count / (max || 1))) * 26;

// Inline gradient fill for a range track (filled portion + remainder).
const rangeFill = (val, min, max, filled, track) => {
  const pct = Math.max(0, Math.min(100, ((val - min) / (max - min)) * 100));
  return `linear-gradient(90deg, ${filled} ${pct}%, ${track} ${pct}%)`;
};

// --- icons (verbatim subset + new: map, pin, truck) ---
const Icon = ({ name, size = 18, color = 'currentColor', strokeWidth = 1.6 }) => {
  const paths = {

    bell: <><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9" /><path d="M13.7 21a1.5 1.5 0 0 1-3.4 0" /></>,

    chevronDown: <polyline points="6 9 12 15 18 9" />,

    check: <polyline points="5 12 10 17 19 7" />,
    close: <><line x1="6" y1="6" x2="18" y2="18" /><line x1="6" y1="18" x2="18" y2="6" /></>,
    info: <><circle cx="12" cy="12" r="10" /><line x1="12" y1="16" x2="12" y2="12" /><line x1="12" y1="8" x2="12.01" y2="8" /></>,
    arrow: <><line x1="5" y1="12" x2="19" y2="12" /><polyline points="12 5 19 12 12 19" /></>,
    arrowLeft: <><line x1="19" y1="12" x2="5" y2="12" /><polyline points="12 19 5 12 12 5" /></>,
    search: <><circle cx="11" cy="11" r="7" /><line x1="20" y1="20" x2="16.65" y2="16.65" /></>,
    send: <><line x1="22" y1="2" x2="11" y2="13" /><polygon points="22 2 15 22 11 13 2 9 22 2" /></>,
    sparkle: <><path d="M12 3l1.5 5.5L19 10l-5.5 1.5L12 17l-1.5-5.5L5 10l5.5-1.5z" /></>,
    chartBar: <><line x1="3" y1="20" x2="21" y2="20" /><rect x="6" y="11" width="3" height="8" /><rect x="11" y="6" width="3" height="13" /><rect x="16" y="14" width="3" height="5" /></>,
    trendUp: <><polyline points="3 17 9 11 13 14 21 6" /><polyline points="15 6 21 6 21 12" /></>,
    dollar: <><line x1="12" y1="2" x2="12" y2="22" /><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" /></>,
    fileText: <><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" /><polyline points="14 2 14 8 20 8" /><line x1="8" y1="13" x2="16" y2="13" /><line x1="8" y1="17" x2="13" y2="17" /></>,
    creditCard: <><rect x="2" y="5" width="20" height="14" rx="2" /><line x1="2" y1="10" x2="22" y2="10" /><line x1="6" y1="15" x2="9" y2="15" /></>,
    receipt: <><path d="M6 2h12v20l-2.4-1.6L13.2 22 12 20.4 10.8 22 8.4 20.4 6 22z" /><line x1="9" y1="8" x2="15" y2="8" /><line x1="9" y1="12" x2="15" y2="12" /></>,
    briefcase: <><rect x="2" y="7" width="20" height="14" rx="2" /><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2" /><line x1="2" y1="13" x2="22" y2="13" /></>,
    bank: <><line x1="3" y1="21" x2="21" y2="21" /><path d="M3 10l9-6 9 6" /><line x1="6" y1="10" x2="6" y2="21" /><line x1="10" y1="10" x2="10" y2="21" /><line x1="14" y1="10" x2="14" y2="21" /><line x1="18" y1="10" x2="18" y2="21" /></>,
    shield: <path d="M12 2L4 5v6c0 5 3.5 8.5 8 10 4.5-1.5 8-5 8-10V5z" />,
    checkCircle: <><circle cx="12" cy="12" r="9" /><polyline points="8 12 11 15 16 9" /></>,
    building: <><rect x="6" y="3" width="12" height="18" rx="1" /><line x1="9" y1="7" x2="11" y2="7" /><line x1="13" y1="7" x2="15" y2="7" /><line x1="9" y1="11" x2="11" y2="11" /><line x1="13" y1="11" x2="15" y2="11" /><line x1="9" y1="15" x2="11" y2="15" /><line x1="13" y1="15" x2="15" y2="15" /></>,
    // --- new for this demo ---
    map: <><polygon points="1 6 8 3 16 6 23 3 23 18 16 21 8 18 1 21 1 6" /><line x1="8" y1="3" x2="8" y2="18" /><line x1="16" y1="6" x2="16" y2="21" /></>,
    pin: <><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0z" /><circle cx="12" cy="10" r="3" /></>,
    truck: <><rect x="1" y="6" width="13" height="10" rx="1" /><path d="M14 9h4l3 3v4h-7z" /><circle cx="6" cy="18" r="2" /><circle cx="17.5" cy="18" r="2" /></>,
    refresh: <><polyline points="21 4 21 10 15 10" /><polyline points="3 20 3 14 9 14" /><path d="M3.5 9a9 9 0 0 1 15-3.4L21 8" /><path d="M20.5 15a9 9 0 0 1-15 3.4L3 16" /></>,
    move: <><polyline points="5 9 2 12 5 15" /><polyline points="9 5 12 2 15 5" /><polyline points="15 19 12 22 9 19" /><polyline points="19 9 22 12 19 15" /><line x1="2" y1="12" x2="22" y2="12" /><line x1="12" y1="2" x2="12" y2="22" /></>,
  };
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color}
      strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round">
      {paths[name]}

};

// --- atoms (verbatim from index.html) ---
const Card = ({ children, style, padded = true }) => (
  <div style={{
    background: T.card, border: `1px solid ${T.border}`, borderRadius: 12,
    padding: padded ? 18 : 0, ...style
  }}>{children}</div>
);
const Label = ({ children, style }) => (
  <div style={{ fontSize: 12, fontWeight: 500, color: T.textSoft, marginBottom: 6, ...style }}>{children}</div>
);
const SectionTitle = ({ children, style }) => (
  <div style={{ fontSize: 14, fontWeight: 600, color: T.text, ...style }}>{children}</div>
);
const Helper = ({ children, style }) => (
  <div style={{ fontSize: 12, color: T.muted, ...style }}>{children}</div>
);
const Input = ({ value, onChange, placeholder, style, type }) => (
  <input
    type={type || 'text'} value={value} onChange={onChange} placeholder={placeholder}
    style={{
      width: '100%', padding: '9px 12px', border: `1px solid ${T.border}`,
      borderRadius: 8, background: T.card, color: T.text, outline: 'none', ...style
    }}
  />
);
const Select = ({ value, onChange, children, style }) => (
  <select value={value} onChange={onChange}
    style={{
      width: '100%', padding: '9px 12px', border: `1px solid ${T.border}`, borderRadius: 8,
      background: T.card, color: T.text, appearance: 'none',
      backgroundImage: `linear-gradient(45deg, transparent 50%, ${T.muted} 50%), linear-gradient(135deg, ${T.muted} 50%, transparent 50%)`,
      backgroundPosition: 'calc(100% - 16px) 50%, calc(100% - 11px) 50%',
      backgroundSize: '5px 5px, 5px 5px', backgroundRepeat: 'no-repeat',
      paddingRight: 32, cursor: 'pointer', ...style
    }}>
    {children}
  </select>
);
const Btn = ({ variant = 'ghost', children, onClick, style, disabled, icon, iconRight, size = 'md', title, type }) => {
  const sizes = {
    sm: { padding: '5px 10px', fontSize: 12, minHeight: 28 },
    md: { padding: '7px 13px', fontSize: 13, minHeight: 32 },
    lg: { padding: '9px 16px', fontSize: 14, minHeight: 38 },
  };
  const iconSize = size === 'sm' ? 12 : size === 'lg' ? 15 : 13;
  const base = {
    borderRadius: 8, border: `1px solid ${T.border}`,
    background: T.card, color: T.text, fontWeight: 500, cursor: 'pointer',
    display: 'inline-flex', alignItems: 'center', gap: 6, whiteSpace: 'nowrap',
    lineHeight: 1.2, ...sizes[size]
  };
  const styles = {
    ghost: { ...base },
    soft: { ...base, background: T.fieldBg },
    primary: { ...base, background: T.primary, color: '#fff', borderColor: T.primary },
    primaryOutline: { ...base, background: T.card, color: T.primary, borderColor: T.primary, fontWeight: 600 },
    light: { ...base, background: '#fff', color: T.primary, borderColor: '#fff', fontWeight: 700 },
    danger: { ...base, background: T.red, color: '#fff', borderColor: T.red },
    iconOnly: { ...base, padding: size === 'sm' ? 6 : 7, minWidth: sizes[size].minHeight },
  };
  return (
    <button onClick={onClick} disabled={disabled} data-btn={variant} title={title} type={type}
      style={{ ...styles[variant], opacity: disabled ? 0.5 : 1, cursor: disabled ? 'not-allowed' : 'pointer', ...style }}>
      {icon && <Icon name={icon} size={iconSize} />}
      {children}
      {iconRight && <Icon name={iconRight} size={iconSize} />}
    </button>
  );
};
const Toggle = ({ on, onChange, size = 'md' }) => {
  const w = size === 'sm' ? 32 : 38;
  const h = size === 'sm' ? 18 : 22;
  const k = h - 4;
  return (
    <button onClick={() => onChange(!on)}
      style={{
        width: w, height: h, padding: 0, border: 'none', borderRadius: 999,
        background: on ? T.primary : '#D1D5DB', position: 'relative', cursor: 'pointer',
        transition: 'background 0.15s', flexShrink: 0
      }}>
      <span style={{
        position: 'absolute', top: 2, left: on ? w - k - 2 : 2,
        width: k, height: k, borderRadius: '50%', background: '#fff',
        transition: 'left 0.15s', boxShadow: '0 1px 2px rgba(0,0,0,0.15)'
      }} />
    </button>
  );
};
const Pill = ({ children, color = 'neutral', style }) => {
  const palettes = {
    neutral: { bg: T.fieldBg, fg: T.muted, bd: T.border },
    green: { bg: T.greenSoft, fg: T.greenDark, bd: '#A7F3D0' },
    amber: { bg: T.amberSoft, fg: T.amber, bd: '#FCD34D' },
    blue: { bg: T.blueSoft, fg: T.blue, bd: '#BFDBFE' },
    accent: { bg: T.primarySoft, fg: T.primary, bd: '#C7C9FB' },
    red: { bg: T.redSoft, fg: T.red, bd: '#FECACA' },
    boq: { bg: BOQ.soft, fg: BOQ.navy, bd: '#9FD9D3' },
  };
  const p = palettes[color] || palettes.neutral;
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', padding: '2px 8px', borderRadius: 999,
      background: p.bg, color: p.fg, border: `1px solid ${p.bd}`,
      fontSize: 11, fontWeight: 500, whiteSpace: 'nowrap', ...style
    }}>{children}</span>
  );
};
const Modal = ({ open, onClose, title, subtitle, children, width = 620 }) => {
  useEffect(() => {
    if (!open) return;
    const onKey = e => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [open, onClose]);
  if (!open) return null;
  return (
    <div onClick={onClose} style={{
      position: 'fixed', inset: 0, background: 'rgba(15, 17, 23, 0.42)', zIndex: 200,
      display: 'flex', alignItems: 'flex-start', justifyContent: 'center',
      padding: '8vh 16px', overflowY: 'auto', animation: 'fadein 0.15s ease'
    }}>
      <div onClick={e => e.stopPropagation()} style={{
        background: T.card, borderRadius: 16, width: '100%', maxWidth: width,
        boxShadow: '0 24px 56px rgba(0, 0, 0, 0.18)', overflow: 'hidden'
      }}>
        <div style={{
          padding: '20px 24px', borderBottom: `1px solid ${T.border}`,
          display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 16
        }}>
          <div style={{ minWidth: 0 }}>
            <div style={{ fontSize: 16, fontWeight: 600 }}>{title}</div>
            {subtitle && <Helper style={{ marginTop: 4 }}>{subtitle}</Helper>}
          </div>
          <button onClick={onClose} aria-label="Close" style={{
            border: 'none', background: 'transparent', color: T.muted,
            padding: 6, cursor: 'pointer', flexShrink: 0, borderRadius: 8
          }}>
            <Icon name="close" size={18} />
          </button>
        </div>
        <div style={{ padding: 24 }}>{children}</div>
      </div>
    </div>
  );
};

// --- error boundary + toast (verbatim) ---
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) { console.error('Render crash:', error, info); }
  render() {
    if (this.state.error) {
      return (
        <div style={{
          padding: 24, margin: 24, border: `1px solid ${T.red}`, borderRadius: 12,
          background: T.redSoft, color: T.red, fontFamily: 'monospace', fontSize: 12
        }}>
          <div style={{ fontWeight: 700, marginBottom: 8 }}>⚠ Render crashed</div>
          <div>{String(this.state.error?.message || this.state.error)}</div>
          <pre style={{ marginTop: 10, fontSize: 11, whiteSpace: 'pre-wrap' }}>{this.state.error?.stack}</pre>
        </div>
      );
    }
    return this.props.children;
  }
}

const MiniSpark = ({ data, w = 110, h = 32, color = PD.spark, fill = true }) => {
  if (!data || data.length < 2) return null;
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 1;
  const step = w / (data.length - 1);
  const pts = data.map((v, i) => [i * step, h - 4 - ((v - min) / range) * (h - 8)]);
  const d = pts.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(' ');
  const area = `${d} L ${w} ${h} L 0 ${h} Z`;
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{ display: 'block', maxWidth: '100%' }}>
      {fill && <path d={area} fill={color} opacity={0.08} />}
      <path d={d} fill="none" stroke={color} strokeWidth={1.6} strokeLinecap="round" strokeLinejoin="round" vectorEffect="non-scaling-stroke" />
      <circle cx={pts[pts.length - 1][0]} cy={pts[pts.length - 1][1]} r={2.4} fill={color} />
    </svg>
  );
};
// Responsive line chart. Uses a wide viewBox with UNIFORM scaling (no
// preserveAspectRatio="none"), so the height derives from the container width
// via the viewBox aspect — text and points stay crisp and the line never looks
// vertically squeezed. Height grows with column width (~aspect 1000:340).
const LineChart = ({ data, color = PD.spark, smooth = true, axisFormat, gid = 'lc' }) => {
  const [hover, setHover] = useState(-1);
  const vw = 1000, vh = 340;
  const padL = 62, padR = 24, padT = 26, padB = 36;
  if (!Array.isArray(data) || data.length === 0) return null;
  const min = Math.min(...data.map(d => d.v));
  const max = Math.max(...data.map(d => d.v));
  const head = (max - min) * 0.14 || 1;
  const lo = Math.max(0, min - head), hi = max + head, range = hi - lo || 1;
  const step = (vw - padL - padR) / Math.max(1, data.length - 1);
  const yOf = v => vh - padB - ((v - lo) / range) * (vh - padT - padB);
  const pts = data.map((d, i) => [padL + i * step, yOf(d.v)]);
  const line = (() => {
    if (!smooth) return pts.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p[0]} ${p[1]}`).join(' ');
    let d = `M ${pts[0][0]} ${pts[0][1]}`;
    for (let i = 1; i < pts.length; i++) {
      const a = pts[i - 1], b = pts[i];
      d += ` C ${a[0] + (b[0] - a[0]) / 3} ${a[1]}, ${a[0] + 2 * (b[0] - a[0]) / 3} ${b[1]}, ${b[0]} ${b[1]}`;
    }
    return d;
  })();
  const area = `${line} L ${pts[pts.length - 1][0]} ${vh - padB} L ${padL} ${vh - padB} Z`;
  const yT = 4;
  const ticks = Array.from({ length: yT + 1 }, (_, i) => lo + (i / yT) * range);
  const fmt = axisFormat || (v => v >= 1000 ? `$${Math.round(v / 1000)}k` : `$${Math.round(v)}`);
  const last = pts[pts.length - 1];
  return (
    <svg viewBox={`0 0 ${vw} ${vh}`} width="100%" style={{ display: 'block', height: 'auto' }}
      onMouseLeave={() => setHover(-1)}>
      <defs>
        <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.22" />
          <stop offset="100%" stopColor={color} stopOpacity="0" />
        </linearGradient>
      </defs>
      {ticks.map((tv, i) => {
        const y = vh - padB - (i / yT) * (vh - padT - padB);
        return (
          <g key={i}>
            <line x1={padL} x2={vw - padR} y1={y} y2={y} stroke={T.border} strokeWidth={1} strokeDasharray={i === 0 ? '0' : '4 5'} />
            <text x={padL - 10} y={y + 4} fontSize="13" textAnchor="end" fill={T.muted}>{fmt(tv)}</text>
          </g>
        );
      })}
      <path d={area} fill={`url(#${gid})`} />
      <path d={line} fill="none" stroke={color} strokeWidth={3} strokeLinecap="round" strokeLinejoin="round" />
      {pts.map((p, i) => (
        <rect key={i} x={p[0] - step / 2} y={padT} width={step} height={vh - padT - padB}
          fill="transparent" onMouseEnter={() => setHover(i)} style={{ cursor: 'pointer' }} />
      ))}
      {data.map((d, i) => (
        i % Math.max(1, Math.floor(data.length / 8)) === 0 || i === data.length - 1 ? (
          <text key={i} x={pts[i][0]} y={vh - 12} fontSize="13" textAnchor="middle" fill={T.muted}>{d.label}</text>
        ) : null
      ))}
      <circle cx={last[0]} cy={last[1]} r={5} fill={color} stroke="#fff" strokeWidth={2.5} />
      {hover >= 0 && (
        <g pointerEvents="none">
          <line x1={pts[hover][0]} x2={pts[hover][0]} y1={padT} y2={vh - padB} stroke={color} strokeWidth={1.2} strokeDasharray="4 4" opacity={0.45} />
          <circle cx={pts[hover][0]} cy={pts[hover][1]} r={6} fill="#fff" stroke={color} strokeWidth={2.5} />
          <g transform={`translate(${Math.min(Math.max(pts[hover][0], padL + 52), vw - padR - 52)}, ${Math.max(pts[hover][1] - 48, padT + 12)})`}>
            <rect x={-52} y={-30} width={104} height={42} rx={8} fill={T.text} opacity={0.94} />
            <text x={0} y={-13} fontSize="12" fill="#fff" opacity={0.7} textAnchor="middle">{data[hover].label}</text>
            <text x={0} y={5} fontSize="16" fontWeight="700" fill="#fff" textAnchor="middle">{fmt(data[hover].v)}</text>
          </g>
        </g>
      )}
    </svg>
  );
};

const SvgTip = ({ x, y, title, sub }) => {
  const wTitle = title.length * 8.6;
  const wSub = (sub || '').length * 6.4;
  const w = Math.max(72, wTitle, wSub) + 20;
  const h = sub ? 42 : 26;
  return (
    <g transform={`translate(${x}, ${y})`} pointerEvents="none" style={{ animation: 'fadein 0.1s ease' }}>
      <rect x={-w / 2} y={-h - 12} width={w} height={h} rx={7} fill={T.text} opacity={0.94} />
      <polygon points={`-7,${-12} 7,${-12} 0,${-3}`} fill={T.text} opacity={0.94} />
      <text x={0} y={-h - 12 + 17} fontSize="15" fontWeight="700" fill="#fff" textAnchor="middle">{title}</text>
      {sub && <text x={0} y={-h - 12 + 33} fontSize="12.5" fill="#fff" opacity={0.78} textAnchor="middle">{sub}</text>}
    </g>
  );
};

// --- interactive globe: real world-land + Australia, re-projected with d3-geo
// on every rotate/zoom. Drag to spin, scroll (or the +/- buttons) to zoom. ---
const GlobeBtn = ({ children, onClick, title }) => (
  <button onClick={onClick} title={title} data-hover="row" style={{
    width: 32, height: 32, border: 'none', background: 'transparent',
    color: T.textSoft, fontSize: 17, fontWeight: 600, lineHeight: 1, cursor: 'pointer',
    display: 'inline-flex', alignItems: 'center', justifyContent: 'center'
  }}>{children}</button>
);

const GlobeMap = ({ data, hover, setHover, onDrill }) => {
  const VB = 640, CC = 320, MINS = 215, MAXS = 1100;
  const [rot, setRot] = useState([134, -26]);     // [lon, lat] of the globe centre
  const [scale, setScale] = useState(300);
  const [dragging, setDragging] = useState(false);
  const dragRef = useRef(null);
  const movedRef = useRef(false);
  const svgRef = useRef(null);
  const maxState = Math.max(...Object.values(data.states));

  const projection = d3.geoOrthographic().rotate([-rot[0], -rot[1]]).scale(scale).translate([CC, CC]).clipAngle(90);
  const path = d3.geoPath(projection);
  const gratPath = path(d3.geoGraticule().step([20, 20])());
  const landPath = path(GEO_LAND);
  const ausPath = path(GEO_AUS);
  const center = [rot[0], rot[1]];
  const visible = (ll) => d3.geoDistance(ll, center) < Math.PI / 2 - 0.015;
  const mk = (count) => (7 + Math.sqrt(count / maxState) * 28) * Math.min(1.7, scale / 300);

  // wheel zoom — non-passive so we can preventDefault the page scroll
  useEffect(() => {
    const el = svgRef.current; if (!el) return;
    const onWheel = (e) => { e.preventDefault(); setScale(s => Math.max(MINS, Math.min(MAXS, s * (e.deltaY < 0 ? 1.09 : 0.917)))); };
    el.addEventListener('wheel', onWheel, { passive: false });
    return () => el.removeEventListener('wheel', onWheel);
  }, []);

  // drag / one-finger touch to rotate — move + end on window so it keeps tracking
  useEffect(() => {
    const apply = (cx, cy) => {
      const d = dragRef.current; if (!d) return;
      const dx = cx - d.x0, dy = cy - d.y0;
      if (Math.abs(dx) + Math.abs(dy) > 4) movedRef.current = true;
      const k = 0.30 * (300 / d.s);
      setRot([d.r0[0] - dx * k, Math.max(-89, Math.min(89, d.r0[1] + dy * k))]);
    };
    const onMM = (e) => apply(e.clientX, e.clientY);
    const onTM = (e) => { if (dragRef.current && e.touches[0]) { apply(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); } };
    const onUp = () => { if (dragRef.current) { dragRef.current = null; setDragging(false); document.body.style.userSelect = ''; } };
    window.addEventListener('mousemove', onMM);
    window.addEventListener('mouseup', onUp);
    window.addEventListener('touchmove', onTM, { passive: false });
    window.addEventListener('touchend', onUp);
    return () => {
      window.removeEventListener('mousemove', onMM);
      window.removeEventListener('mouseup', onUp);
      window.removeEventListener('touchmove', onTM);
      window.removeEventListener('touchend', onUp);
    };
  }, []);

  const begin = (cx, cy) => { movedRef.current = false; dragRef.current = { x0: cx, y0: cy, r0: rot, s: scale }; setDragging(true); document.body.style.userSelect = 'none'; };
  const zoomBy = (f) => setScale(s => Math.max(MINS, Math.min(MAXS, s * f)));
  const reset = () => { setRot([134, -26]); setScale(300); };

  return (
    <div style={{ position: 'relative', maxWidth: 480, margin: '0 auto' }}>
      <svg ref={svgRef} viewBox={`0 0 ${VB} ${VB}`} width="100%"
        style={{ display: 'block', cursor: dragging ? 'grabbing' : 'grab', touchAction: 'none', userSelect: 'none' }}
        onMouseDown={(e) => begin(e.clientX, e.clientY)}
        onTouchStart={(e) => { if (e.touches[0]) begin(e.touches[0].clientX, e.touches[0].clientY); }}
        onMouseLeave={() => setHover(null)}>
        <defs>
          <radialGradient id="boqOcean" cx="38%" cy="30%" r="78%">
            <stop offset="0%" stopColor="#8AA0DD" /><stop offset="46%" stopColor="#4A66AE" /><stop offset="100%" stopColor="#21366B" />
          </radialGradient>
          <radialGradient id="boqLimb" cx="50%" cy="50%" r="50%">
            <stop offset="60%" stopColor="#0A1430" stopOpacity="0" /><stop offset="100%" stopColor="#0A1430" stopOpacity="0.52" />
          </radialGradient>
          <radialGradient id="boqAtmos" cx="50%" cy="50%" r="50%">
            <stop offset="85%" stopColor={T.primary} stopOpacity="0" /><stop offset="100%" stopColor={T.primary} stopOpacity="0.28" />
          </radialGradient>
        </defs>
        <ellipse cx={CC} cy={Math.min(VB - 6, CC + scale + 22)} rx={Math.min(scale, 320) * 0.72} ry={14} fill="#0F1117" opacity={0.10} />
        <circle cx={CC} cy={CC} r={scale + 13} fill="url(#boqAtmos)" />
        <circle cx={CC} cy={CC} r={scale} fill="url(#boqOcean)" />
        <path d={gratPath} fill="none" stroke="#FFFFFF" strokeOpacity={0.16} strokeWidth={0.8} />
        <path d={landPath} fill="#D7DEF0" fillOpacity={0.24} />
        <path d={ausPath} fill="#EFEAD9" stroke="#B7B299" strokeWidth={0.9} />
        {Object.keys(data.states).map(id => {
          const ll = CITY_LL[id], count = data.states[id] || 0;
          if (!ll || !count || id === 'ACT' || !visible(ll)) return null;
          const p = projection(ll); const r = mk(count);
          const home = id === 'NSW', active = hover === id;
          return (
            <g key={id} onMouseEnter={() => setHover(id)}
              onClick={() => { if (home && !movedRef.current) onDrill(); }}
              style={{ cursor: home ? 'pointer' : 'default' }}>
              <circle cx={p[0]} cy={p[1]} r={r} fill={T.primary} opacity={active ? 0.34 : 0.22} />
              {home && <circle cx={p[0]} cy={p[1]} r={r + 5} fill="none" stroke="#FFFFFF" strokeOpacity={0.7} strokeWidth={1.6} />}
              <circle cx={p[0]} cy={p[1]} r={Math.max(4, r * 0.36)} fill={home ? '#FFFFFF' : T.primary} stroke={home ? T.primary : '#FFFFFF'} strokeWidth={2} />
            </g>
          );
        })}
        <circle cx={CC} cy={CC} r={scale} fill="url(#boqLimb)" pointerEvents="none" />
        {hover && data.states[hover] && CITY_LL[hover] && visible(CITY_LL[hover]) && (() => {
          const p = projection(CITY_LL[hover]); const count = data.states[hover];
          return <SvgTip x={p[0]} y={p[1] - mk(count) - 6} title={STATE_NAMES[hover]} sub={`${count} job${count === 1 ? '' : 's'}`} />;
        })()}
      </svg>

      <div style={{
        position: 'absolute', right: 12, bottom: 12, display: 'flex', flexDirection: 'column',
        background: T.card, border: `1px solid ${T.border}`, borderRadius: 10,
        boxShadow: '0 2px 8px rgba(15,17,23,0.12)', overflow: 'hidden'
      }}>
        <GlobeBtn onClick={() => zoomBy(1.3)} title="Zoom in">+</GlobeBtn>
        <div style={{ height: 1, background: T.border }} />
        <GlobeBtn onClick={() => zoomBy(0.77)} title="Zoom out">−</GlobeBtn>
        <div style={{ height: 1, background: T.border }} />
        <GlobeBtn onClick={reset} title="Reset to Australia"><Icon name="refresh" size={14} color={T.textSoft} /></GlobeBtn>
      </div>
      <div style={{
        position: 'absolute', left: 12, top: 12, display: 'inline-flex', alignItems: 'center', gap: 6,
        padding: '5px 10px', borderRadius: 999, background: 'rgba(255,255,255,0.85)',
        border: `1px solid ${T.border}`, fontSize: 11, fontWeight: 500, color: T.muted, pointerEvents: 'none'
      }}>
        <Icon name="move" size={12} color={T.muted} /> Drag to rotate
      </div>
    </div>
  );
};

const GeoHeatmap = ({ data, onToast }) => {
  const [hover, setHover] = useState(null);
  const [drill, setDrill] = useState(null);
  const maxState = Math.max(...Object.values(data.states));
  const maxSub = Math.max(...NSW_SUBURBS.map(s => s.count));

    .map(id => ({ id, count: data.states[id] }))

      <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>

                padding: '7px 8px', borderRadius: 8, border: 'none',
                background: active ? T.fieldBg : 'transparent', cursor: (!drill && row.id === 'NSW') ? 'pointer' : 'default'
              }}>
              <span style={{ width: 12, height: 12, borderRadius: 3, background: heatColor(row.count, max), border: `1px solid ${T.border}`, flexShrink: 0 }} />
              <span style={{ flex: 1, fontSize: 13, fontWeight: 500, color: T.textSoft }}>{name}</span>
              <span className="tpl-num" style={{ fontSize: 13, fontWeight: 700, color: row.count ? T.text : T.mutedSoft }}>{row.count}</span>
              <span style={{ fontSize: 11, color: T.muted }}>jobs</span>
            </button>
          );
        })}

  return (

      <Card>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 12, marginBottom: 6 }}>

        {!drill && (
          <div>
            <GlobeMap data={data} hover={hover} setHover={setHover} onDrill={() => { setDrill('NSW'); setHover(null); }} />
            <Helper style={{ marginTop: 12, textAlign: 'center' }}>
              Your jobs, plotted on the globe — New South Wales is your home state. Click it to drill into suburb-level volume.
            </Helper>
          </div>
        )}

        {drill && (
          <div style={{ position: 'relative' }}>
            <svg viewBox="0 0 600 440" width="100%" style={{ display: 'block', maxHeight: 460 }}
              onMouseLeave={() => setHover(null)}>
              {/* faint NSW backdrop for context */}

              <path d="M470,108 540,150 548,300 470,372" fill="none" stroke="#BFD0E8" strokeWidth={2} />
              <text x={150} y={420} fontSize="13" fill={T.mutedSoft}>Greater Sydney &amp; surrounds</text>

  const STEPS = [
    { id: 'amount', n: 1, label: isLoan ? 'Amount' : 'Product' },
    { id: 'details', n: 2, label: 'Your details' },
    { id: 'done', n: 3, label: 'Submitted' },

  const p = BUSINESS_PROFILE;

  const back = () => setStep(s => Math.max(0, s - 1));

  return (
    <Fragment>
      <div style={{ position: 'fixed', inset: 0, background: 'rgba(15,17,23,0.55)', zIndex: 250, animation: 'fadein 0.15s ease' }} />

          <div style={{ maxWidth: 680, margin: '0 auto' }}>

            {step === 0 && isLoan && (
              <Card padded style={{ padding: 24 }}>
                <Pill color="green" style={{ marginBottom: 14 }}>Pre-approved</Pill>

                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, color: T.muted, marginTop: 6 }}>
                  <span>{fmtMoney(sliderMin)}</span><span>{fmtMoney(ctx.maxAmount)}</span>

                <div style={{ display: 'flex', gap: 12, marginTop: 22, flexWrap: 'wrap' }}>

              <Card padded style={{ padding: 24 }}>
                <Pill color="accent" style={{ marginBottom: 14 }}>$0 monthly fee</Pill>

                      <Label>Entity type</Label>
                      <Select value={p.entity} onChange={() => {}}>

              </div>
            )}

            {step === 2 && (
              <Card padded style={{ padding: '40px 28px', textAlign: 'center' }}>
                <div style={{ width: 64, height: 64, borderRadius: '50%', background: T.greenSoft, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', marginBottom: 18 }}>

                </div>
                <div style={{ fontSize: 22, fontWeight: 700, letterSpacing: -0.3 }}>Application submitted</div>

          <Helper style={{ fontSize: 11.5 }}>Step {Math.min(step + 1, 3)} of 3 · {STEPS[step].label}</Helper>

          {step === 2 && <Btn variant="primary" onClick={() => onSubmitted(ctx, amount)}>Done</Btn>}

      </div>
    </Fragment>
  );
};

              <button onClick={() => onContinue(false)} style={{ border: 'none', background: 'transparent', color: T.muted, fontSize: 12, cursor: 'pointer' }}>
                Skip for now
              </button>
            </div>
          </div>
        </Card>
      </div>
    </div>
  );
};

// ============================================================================
// SIDEBAR
// ============================================================================
const NAV = [
  { id: 'dashboard', icon: 'chartBar',  label: 'Dashboard' },
  { id: 'banking',   icon: 'bank',      label: 'Banking' },
  { id: 'expenses',  icon: 'receipt',   label: 'Expenses' },
  { id: 'assets',    icon: 'briefcase', label: 'Assets' },
  { id: 'budget',    icon: 'trendUp',   label: 'Budget' },
  { id: 'jobsmap',   icon: 'map',       label: 'Jobs map' },
];
const Sidebar = ({ active, go }) => (
  <aside style={{
    width: 220, background: T.card, borderRight: `1px solid ${T.border}`,
    padding: '20px 16px', display: 'flex', flexDirection: 'column', gap: 14, flexShrink: 0,
    position: 'sticky', top: 0, alignSelf: 'flex-start', height: '100vh', overflowY: 'auto'
  }}>
    <div style={{ padding: '0 6px' }}><SoleLogo size={22} tag="(Business)" /></div>

    <div style={{ marginTop: 4 }}>
      <div style={{ fontSize: 10, fontWeight: 700, color: T.muted, letterSpacing: 0.6, textTransform: 'uppercase', padding: '0 8px 6px' }}>Menu</div>
      {NAV.map(m => {
        const on = active === m.id;
        return (
          <button key={m.id} data-hover="row" onClick={() => go(m.id)} style={{
            width: '100%', display: 'flex', alignItems: 'center', gap: 10, padding: '8px 10px',
            border: 'none', borderRadius: 8,
            background: on ? T.primary : 'transparent', color: on ? '#fff' : T.textSoft,
            fontSize: 13, fontWeight: on ? 600 : 500, cursor: 'pointer', textAlign: 'left'
          }}>
            <Icon name={m.icon} size={15} color={on ? '#fff' : T.muted} />
            <span style={{ flex: 1 }}>{m.label}</span>
          </button>
        );
      })}
    </div>

    <div style={{ marginTop: 'auto', display: 'flex', flexDirection: 'column', gap: 10 }}>
      <div style={{ padding: 10, borderRadius: 8, background: T.fieldBg, display: 'flex', alignItems: 'center', gap: 10 }}>
        <span style={{ width: 30, height: 30, borderRadius: '50%', background: `radial-gradient(circle at 30% 30%, ${T.primary}, ${T.primaryDark})`, color: '#fff', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', fontWeight: 700, fontSize: 12, flexShrink: 0 }}>
          {BUSINESS_PROFILE.owner.charAt(0)}
        </span>
        <div style={{ minWidth: 0 }}>
          <div style={{ fontSize: 12.5, fontWeight: 600, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{BUSINESS_PROFILE.owner}</div>
          <div style={{ fontSize: 11, color: T.muted, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{BUSINESS_PROFILE.short}</div>
        </div>
      </div>
      <div style={{ padding: '0 6px' }}><PoweredByBoq /></div>
    </div>
  </aside>
);

// ============================================================================
// APP SHELL + ROUTING
// ============================================================================
const SECTIONS = ['welcome', 'dashboard', 'banking', 'expenses', 'assets', 'budget', 'jobsmap'];
const parseHash = (hash) => {
  const m = (hash || '').match(/^#\/?([\w-]+)?/);
  const s = m && m[1];
  return SECTIONS.includes(s) ? s : 'welcome';
};

const BoqApp = () => {
  const [section, setSection] = useState(() => parseHash(window.location.hash));
  const [loanCtx, setLoanCtx] = useState(null);
  const [optedIn, setOptedIn] = useState(false);
  const [toast, setToast] = useState(null);
  const toastTimer = useRef(null);

  useEffect(() => {
    const target = `#/${section}`;
    if (window.location.hash !== target) window.history.replaceState(null, '', target);
  }, [section]);
  useEffect(() => {
    const onHash = () => setSection(parseHash(window.location.hash));
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  const fireToast = (msg) => {
    setToast(msg);
    if (toastTimer.current) clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(null), 3600);
  };
  const go = (s) => { setSection(s); window.scrollTo(0, 0); };
  const openLoan = (ctx) => setLoanCtx(ctx);

  if (section === 'welcome') {
    return (
      <Fragment>
        <WelcomeScreen onContinue={(opt) => {
          setOptedIn(opt);
          go('dashboard');
          if (opt) fireToast('Nice — we’ll set up your free BOQ business account.');
        }} />
        <Toast toast={toast} onClose={() => setToast(null)} />
      </Fragment>
    );
  }

  const page = (() => {
    switch (section) {
      case 'banking':  return <BankingPage openLoan={openLoan} />;
      case 'expenses': return <ExpensesPage openLoan={openLoan} />;
      case 'assets':   return <AssetsPage openLoan={openLoan} />;
      case 'budget':   return <BudgetPage openLoan={openLoan} />;
      case 'jobsmap':  return <JobsMapPage onToast={fireToast} />;
      default:         return <DashboardPage openLoan={openLoan} go={go} />;
    }
  })();

  return (
    <div style={{ minHeight: '100vh', background: T.bg, display: 'flex' }}>
      <Sidebar active={section} go={go} />
      <div style={{ flex: 1, minWidth: 0 }}>{page}</div>
      {loanCtx && (
        <LoanWizard ctx={loanCtx} onClose={() => setLoanCtx(null)}
          onSubmitted={(ctx, amount) => {
            setLoanCtx(null);
            const isLoan = ctx.maxAmount > 0;
            fireToast(isLoan
              ? `Application sent to BOQ — they’ll be in touch within 24 hours about your ${ctx.productName}.`
              : `Account request sent to BOQ — they’ll be in touch within 24 hours.`);
          }} />
      )}
      <Toast toast={toast} onClose={() => setToast(null)} />
    </div>
  );
};

const Root = () => <BoqApp />;

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary><Root /></ErrorBoundary>
);
</script>
</body>
</html>
