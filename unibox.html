     v8 (automatic JSX runtime → import stmt → blank page). See docs/MEMORY.md. -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-size: 13px; line-height: 1.45; color: #0F1117; background: #F5F4F8;
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; font-size: inherit; cursor: pointer; }
  input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: #5B5BF6 !important; box-shadow: 0 0 0 3px rgba(91, 91, 246, 0.12); }
  button:focus-visible { outline: 2px solid #5B5BF6; outline-offset: 2px; }
  ::placeholder { color: #9CA3AF; }

  /* Hover states — inline styles can't express :hover, so interactive elements tag
     themselves with data-attrs and pick up treatments here. */
  button[data-btn]:not(:disabled) { transition: background 0.12s, border-color 0.12s, color 0.12s, box-shadow 0.12s, transform 0.05s; }
  button[data-btn]:not(:disabled):active { transform: translateY(0.5px); }
  button[data-btn="ghost"]:not(:disabled):hover          { background: #F9FAFB; border-color: #D1D5DB; }
  button[data-btn="soft"]:not(:disabled):hover           { background: #EEF0FF; border-color: #C7C9FB; }
  button[data-btn="primary"]:not(:disabled):hover        { background: #4F46E5; border-color: #4F46E5; box-shadow: 0 2px 8px rgba(79, 70, 229, 0.25); }
  button[data-btn="primaryOutline"]:not(:disabled):hover { background: #EEF0FF; }
  button[data-btn="iconOnly"]:not(:disabled):hover       { background: #F3F4F6; }
  button[data-btn="danger"]:not(:disabled):hover         { background: #DC2626; border-color: #DC2626; }
  [data-hover="row"]:not(:disabled)        { transition: background 0.1s; }
  [data-hover="row"]:not(:disabled):hover  { background: #F9FAFB; }
  [data-hover="nav"]                       { transition: background 0.1s, color 0.1s; }
  [data-hover="nav"]:hover                 { background: #F5F6FF; }
  [data-card="lift"]                       { transition: transform 0.12s ease, box-shadow 0.12s ease, border-color 0.12s ease; }
  [data-card="lift"]:hover                 { transform: translateY(-2px); border-color: #C7C9FB; box-shadow: 0 10px 24px -12px rgba(91,91,246,0.28), 0 1px 2px rgba(15,17,23,0.04); }
  button[data-chip]:not(:disabled):not([data-selected="true"]):hover { background: #F9FAFB; border-color: #D1D5DB; color: #1F2937; }
  .scroll-area { overflow-y: auto; }
  .scroll-area::-webkit-scrollbar { width: 8px; height: 8px; }
  .scroll-area::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 4px; }
  .scroll-area::-webkit-scrollbar-track { background: transparent; }

  @keyframes slidein { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes fadein  { from { opacity: 0; } to { opacity: 1; } }
  @keyframes expand  { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin    { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes rowflash { 0% { box-shadow: 0 0 0 0 rgba(91,91,246,0); } 30% { box-shadow: 0 0 0 4px rgba(91,91,246,0.28); } 100% { box-shadow: 0 0 0 0 rgba(91,91,246,0); } }
  @keyframes ringpop { 0% { transform: scale(1); } 45% { transform: scale(1.06); } 100% { transform: scale(1); } }
  /* Quiet rows reveal their secondary actions only on hover (Asana pattern). */
  .ub-sec { opacity: 0; transition: opacity 0.12s; }
  .ub-row:hover .ub-sec, .ub-row:focus-within .ub-sec { opacity: 1; }
  /* Widget ⋯ menu stays hidden until the widget is hovered. */
  .ub-more { opacity: 0; transition: opacity 0.12s; }
  .ub-widget:hover .ub-more { opacity: 1; }
</style>
</head>

<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo, Fragment } = React;

// --- design tokens (copied from index.html; the small-business Sole app shares this brand) ---
const T = {

// --- icons (Lucide-style; copied from index.html + grid) ---

    inbox: <><polyline points="22 12 16 12 14 15 10 15 8 12 2 12" /><path d="M5.5 5h13l3.5 7v6a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-6z" /></>,
    repeat: <><polyline points="17 1 21 5 17 9" /><path d="M3 11V9a4 4 0 0 1 4-4h14" /><polyline points="7 23 3 19 7 15" /><path d="M21 13v2a4 4 0 0 1-4 4H3" /></>,

    scale: <><line x1="12" y1="3" x2="12" y2="21" /><line x1="6" y1="21" x2="18" y2="21" /><path d="M3 10l3-6 3 6z" /><path d="M15 10l3-6 3 6z" /><line x1="6" y1="4" x2="18" y2="4" /></>,
    users: <><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M22 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" /></>,
    chartBar: <><line x1="3" y1="20" x2="21" y2="20" /><rect x="6" y="11" width="3" height="8" /><rect x="11" y="6" width="3" height="13" /><rect x="16" y="14" width="3" height="5" /></>,

    docs: <><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h9l7 7v9a2 2 0 0 1-2 2z" /><path d="M14 3v6h7" /></>,
    rocket: <><path d="M5 15c0-4 4-7 7-9 3 2 7 5 7 9-1 4-5 7-7 7s-6-3-7-7z" /><circle cx="12" cy="11" r="1.4" fill="currentColor" /><path d="M5 15c-2 1-3 5-1 7 2 1 6 0 7-2" /></>,
    shield: <path d="M12 2L4 5v6c0 5 3.5 8.5 8 10 4.5-1.5 8-5 8-10V5z" />,
    handshake: <><path d="M9 11l-3 3-3-3 4-4a2 2 0 0 1 2.8 0" /><path d="M15 13l3-3 3 3-4 4a2 2 0 0 1-2.8 0" /><line x1="10" y1="12" x2="14" y2="14" /></>,
    smile: <><circle cx="12" cy="12" r="10" /><path d="M8 14s1.5 2 4 2 4-2 4-2" /><line x1="9" y1="9" x2="9.01" y2="9" /><line x1="15" y1="9" x2="15.01" y2="9" /></>,
    star: <polygon points="12 2 15 8.6 22 9.3 17 14.1 18.2 21 12 17.5 5.8 21 7 14.1 2 9.3 9 8.6 12 2" />,
    percent: <><line x1="19" y1="5" x2="5" y2="19" /><circle cx="7" cy="7" r="2" /><circle cx="17" cy="17" r="2" /></>,
    sliders: <><line x1="4" y1="21" x2="4" y2="14" /><line x1="4" y1="10" x2="4" y2="3" /><line x1="12" y1="21" x2="12" y2="12" /><line x1="12" y1="8" x2="12" y2="3" /><line x1="20" y1="21" x2="20" y2="16" /><line x1="20" y1="12" x2="20" y2="3" /><line x1="2" y1="14" x2="6" y2="14" /><line x1="10" y1="8" x2="14" y2="8" /><line x1="18" y1="16" x2="22" y2="16" /></>,
    messageSquare: <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />,
    bell: <><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9" /><path d="M13.7 21a1.5 1.5 0 0 1-3.4 0" /></>,
    search: <><circle cx="11" cy="11" r="7" /><line x1="20" y1="20" x2="16.65" y2="16.65" /></>,
    send: <><line x1="22" y1="2" x2="11" y2="13" /><polygon points="22 2 15 22 11 13 2 9 22 2" /></>,
    mail: <><rect x="2" y="4" width="20" height="16" rx="2" /><path d="M22 7l-10 6L2 7" /></>,
    bank: <><line x1="3" y1="21" x2="21" y2="21" /><path d="M3 10l9-6 9 6" /><line x1="6" y1="10" x2="6" y2="21" /><line x1="10" y1="10" x2="10" y2="21" /><line x1="14" y1="10" x2="14" y2="21" /><line x1="18" y1="10" x2="18" y2="21" /></>,
    sparkle: <path d="M12 3l1.5 5.5L19 10l-5.5 1.5L12 17l-1.5-5.5L5 10l5.5-1.5z" />,
    tag: <><path d="M20.6 13.4l-7.2 7.2a2 2 0 0 1-2.8 0l-7-7A2 2 0 0 1 3 12V4a1 1 0 0 1 1-1h8a2 2 0 0 1 1.4.6l7.2 7.2a2 2 0 0 1 0 2.6z" /><circle cx="7.5" cy="7.5" r="1.1" fill="currentColor" /></>,
    target: <><circle cx="12" cy="12" r="9" /><circle cx="12" cy="12" r="5" /><circle cx="12" cy="12" r="1.5" fill="currentColor" /></>,
    checkCircle: <><circle cx="12" cy="12" r="9" /><polyline points="8 12 11 15 16 9" /></>,
    alertTriangle: <><path d="M10.3 3.86l-8.7 15a2 2 0 0 0 1.71 3h17.4a2 2 0 0 0 1.7-3l-8.7-15a2 2 0 0 0-3.4 0z" /><line x1="12" y1="9" x2="12" y2="13" /><line x1="12" y1="17" x2="12.01" y2="17" /></>,
    flame: <path d="M12 2c1 4 5 5 5 10a5 5 0 1 1-10 0c0-3 2-4 2-7 0 0 2 1 3 0z" />,
    check: <polyline points="5 12 10 17 19 7" />,
    close: <><line x1="6" y1="6" x2="18" y2="18" /><line x1="6" y1="18" x2="18" y2="6" /></>,
    plus: <><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></>,
    arrow: <><line x1="5" y1="12" x2="19" y2="12" /><polyline points="12 5 19 12 12 19" /></>,
    chevronRight: <polyline points="9 18 15 12 9 6" />,
    chevronDown: <polyline points="6 9 12 15 18 9" />,
    upload: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="17 8 12 3 7 8" /><line x1="12" y1="3" x2="12" y2="15" /></>,
    paperclip: <path d="M21 11.5l-9 9a5 5 0 0 1-7-7l9-9a3 3 0 0 1 4 4l-9 9a1 1 0 0 1-1.4-1.4l7.6-7.6" />,

    settings2: <><line x1="4" y1="6" x2="20" y2="6" /><line x1="4" y1="12" x2="20" y2="12" /><line x1="4" y1="18" x2="20" y2="18" /><circle cx="9" cy="6" r="2" fill={T.card} /><circle cx="15" cy="12" r="2" fill={T.card} /><circle cx="8" cy="18" r="2" fill={T.card} /></>,

  return (

      strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round">
      {paths[name]}

  );
};

const ICONCHIP_TONES = {
  accent:  { bg: T.primarySoft, fg: T.primary,   grad: 'linear-gradient(135deg, #5A4FCF 0%, #4A3FBE 100%)', shadow: 'rgba(74,63,190,0.5)' },
  green:   { bg: T.greenSoft,   fg: T.greenDark, grad: 'linear-gradient(135deg, #34D399 0%, #059669 100%)', shadow: 'rgba(5,150,105,0.42)' },
  amber:   { bg: T.amberSoft,   fg: T.amber,     grad: 'linear-gradient(135deg, #FBBF24 0%, #D97706 100%)', shadow: 'rgba(217,119,6,0.42)' },
  blue:    { bg: T.blueSoft,    fg: T.blue,      grad: 'linear-gradient(135deg, #60A5FA 0%, #2563EB 100%)', shadow: 'rgba(37,99,235,0.42)' },
  red:     { bg: T.redSoft,     fg: T.red,       grad: 'linear-gradient(135deg, #F87171 0%, #DC2626 100%)', shadow: 'rgba(220,38,38,0.42)' },
  neutral: { bg: T.fieldBg,     fg: T.muted,     grad: 'linear-gradient(135deg, #9CA3AF 0%, #6B7280 100%)', shadow: 'rgba(107,114,128,0.36)' },
};
const IconChip = ({ icon, tone = 'accent', size = 36, style, gradient }) => {
  const t = ICONCHIP_TONES[tone] || ICONCHIP_TONES.accent;
  const bg = gradient ? t.grad : t.bg;
  const fg = gradient ? '#fff' : t.fg;
  return (
    <div style={{ width: size, height: size, borderRadius: Math.round(size * 0.29), background: bg, color: fg, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, boxShadow: gradient ? `0 6px 14px -6px ${t.shadow}` : undefined, ...style }}>
      <Icon name={icon} size={Math.round(size * 0.5)} color={fg} />
    </div>
  );
};

// --- atoms (copied from index.html) ---
const Card = ({ children, style, padded = true, hover, onClick }) => (
  <div data-card={hover ? 'lift' : 'base'} onClick={onClick} style={{
    background: T.card, border: `1px solid ${T.borderSoft}`, borderRadius: T.radiusCard,
    boxShadow: T.shadowSm, padding: padded ? T.space.lg : 0, ...style
  }}>{children}</div>
);
const Label = ({ children, style }) => (<div style={{ fontSize: 12, fontWeight: 500, color: T.textSoft, marginBottom: 6, ...style }}>{children}</div>);
const SectionTitle = ({ children, style }) => (<div style={{ fontSize: 14, fontWeight: 600, color: T.text, ...style }}>{children}</div>);
const Helper = ({ children, style }) => (<div style={{ fontSize: 12, color: T.muted, ...style }}>{children}</div>);

const StatCard = ({ icon, tone = 'accent', label, value, sub, delta, deltaTone, onClick, style }) => (
  <div onClick={onClick} style={{ background: T.card, border: `1px solid ${T.borderSoft}`, borderRadius: T.radiusCard, boxShadow: T.shadowSm, padding: '13px 15px', display: 'flex', flexDirection: 'column', cursor: onClick ? 'pointer' : 'default', minWidth: 0, ...style }}>
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 8 }}>
      {icon && <IconChip icon={icon} tone={tone} size={32} gradient />}
      {delta != null && <span style={{ fontSize: 11.5, fontWeight: 700, color: deltaTone === 'down' ? T.red : T.greenDark }}>{deltaTone === 'down' ? '▼' : '▲'} {delta}</span>}
    </div>
    <div style={{ fontSize: 11.5, fontWeight: 600, color: T.muted, marginTop: 11 }}>{label}</div>
    <div style={{ fontSize: 22, fontWeight: 800, color: T.text, letterSpacing: -0.4, fontVariantNumeric: 'tabular-nums', marginTop: 2, lineHeight: 1.15 }}>{value}</div>
    {sub && <div style={{ fontSize: 11.5, color: T.muted, marginTop: 3 }}>{sub}</div>}
  </div>
);

const PageHead = ({ title, subtitle, actions, style }) => (
  <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 16, flexWrap: 'wrap', marginBottom: 18, ...style }}>
    <div style={{ minWidth: 0 }}>
      <div style={{ fontSize: 22, fontWeight: 800, color: T.text, letterSpacing: -0.4 }}>{title}</div>
      {subtitle && <Helper style={{ fontSize: 13, marginTop: 3 }}>{subtitle}</Helper>}
    </div>
    {actions && <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>{actions}</div>}
  </div>
);

const BANNER_TONES = {
  success: { bg: T.greenSoft,     bd: '#A7F3D0', fg: T.greenDark, icon: 'checkCircle' },
  info:    { bg: T.blueSoft,      bd: '#BFDBFE', fg: T.blue,      icon: 'info' },
  accent:  { bg: T.primarySofter, bd: '#C7C9FB', fg: T.primary,   icon: 'sparkle' },
  warn:    { bg: T.amberSoft,     bd: '#FCD34D', fg: '#92400E',   icon: 'alertTriangle' },
  danger:  { bg: T.redSoft,       bd: '#FECACA', fg: '#991B1B',   icon: 'alertTriangle' },
};
const Banner = ({ tone = 'info', title, children, icon, action, style }) => {
  const t = BANNER_TONES[tone] || BANNER_TONES.info;
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '12px 16px', background: t.bg, border: `1px solid ${t.bd}`, borderRadius: T.radius, ...style }}>
      <Icon name={icon || t.icon} size={18} color={t.fg} />
      <div style={{ flex: 1, minWidth: 0 }}>
        {title && <div style={{ fontSize: 13.5, fontWeight: 700, color: t.fg }}>{title}</div>}
        {children && <div style={{ fontSize: 12.5, color: t.fg, opacity: 0.92, marginTop: title ? 1 : 0 }}>{children}</div>}
      </div>
      {action}
    </div>
  );
};

const Btn = ({ variant = 'ghost', children, onClick, style, disabled, icon, iconRight, size = 'md', title, type }) => {
  const sizes = { sm: { padding: '5px 10px', fontSize: 12, minHeight: 28 }, md: { padding: '7px 13px', fontSize: 13, minHeight: 32 }, lg: { padding: '9px 16px', fontSize: 14, minHeight: 38 } };
  const iconSize = size === 'sm' ? 12 : size === 'lg' ? 15 : 13;
  const base = { borderRadius: 8, border: `1px solid ${T.border}`, background: T.card, color: T.text, fontWeight: 500, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 6, whiteSpace: 'nowrap', lineHeight: 1.2, ...sizes[size] };
  const styles = {

  const tone = t.tone || (t.action ? 'undo' : 'success');
  const palette = tone === 'undo' ? { bg: '#FFFBEB', bd: '#FCD34D', fg: '#92400E', icon: 'info' } : { bg: T.greenSoft, bd: '#A7F3D0', fg: T.greenDark, icon: 'check' };

};

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) { console.error('Render crash:', error, info); }
  render() {
    if (this.state.error) {
      return (<div style={{ padding: 24, margin: 24, border: `1px solid ${T.red}`, borderRadius: 12, background: T.redSoft, color: T.red, fontFamily: 'monospace', fontSize: 12 }}>
        <div style={{ fontWeight: 700, marginBottom: 8 }}>⚠ Render crashed</div>
        <div>{String(this.state.error?.message || this.state.error)}</div>
        <pre style={{ marginTop: 10, fontSize: 11, whiteSpace: 'pre-wrap' }}>{this.state.error?.stack}</pre>
      </div>);
    }
    return this.props.children;
  }
}

// --- health score (deterministic; encouraging floor; never 0) ---
function computeHealth(items, profile) {
  const penalty = items.reduce((s, it) => s + (it.weight || 0), 0);
  const streakBonus = Math.min(profile.streak || 0, 5);
  const floor = profile.isNew ? 72 : 40;
  let score = clamp(Math.round(Math.max(floor, 100 - penalty + streakBonus)), 1, 100);
  let band, label, tail;
  if (score >= 80)      { band = 'green'; label = 'In the green';         tail = "you're in great shape 🎉"; }
  else if (score >= 60) { band = 'amber'; label = 'A few things to tidy';  tail = "you're in good shape 👍"; }
  else                  { band = 'red';   label = 'Needs attention';       tail = "let's knock a few out"; }
  return { score, band, label, tail };
}

const useViewport = () => {
  const [w, setW] = useState(typeof window !== 'undefined' ? window.innerWidth : 1280);

};

const GET_PAID_TABS = [
  { id: 'send', label: 'To send', filter: i => i.type === 'send_invoice' },
  { id: 'overdue', label: 'Overdue', filter: i => i.type === 'overdue_invoice' },
  { id: 'due', label: 'Due soon', filter: i => i.type === 'due_soon' },
];
const WIDGET_LIST = [
  { id: 'get_paid', label: 'Get paid' },
  { id: 'health', label: 'Business health' },
  { id: 'reconcile', label: 'Reconcile' },
  { id: 'tidy_up', label: 'Tidy up' },
];

const UniboxScreen = ({ items, onComplete, fireToast, focus }) => {
  const [open, setOpen] = useState(null);       // { id, mode }
  const [flashId, setFlashId] = useState(null);
  const [hidden, setHidden] = useState({});     // { [widgetId]: true }
  const [customize, setCustomize] = useState(false);
  const rowRefs = useRef({});
  const vp = useViewport();

  const health = useMemo(() => computeHealth(items, PROFILE), [items]);
  const ranked = useMemo(() => rankItems(items), [items]);
  const byGroup = (g) => ranked.filter(i => i.group === g);
  const top = ranked.slice(0, 3);
  const allClear = items.length === 0;

  const scrollTo = (id, flash) => setTimeout(() => {
    const el = rowRefs.current[id];
    if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); if (flash) { setFlashId(id); setTimeout(() => setFlashId(null), 1400); } }
  }, 60);

  // Bell deep-link: reveal the item's widget and scroll+flash its row.
  useEffect(() => {
    if (!focus || !focus.id) return;
    const it = items.find(i => i.id === focus.id);
    if (it) { setHidden(h => ({ ...h, [it.group]: false })); scrollTo(focus.id, true); }
  }, [focus && focus.nonce]);

  const complete = (item, message) => { onComplete(item, message); setOpen(null); };
  const jumpTo = (id) => { const it = items.find(x => x.id === id); if (it) setHidden(h => ({ ...h, [it.group]: false })); scrollTo(id, true); };
  const onAction = (item, actionId) => {
    if (actionId === 'preview') { fireToast('Opening invoice preview (demo)'); return; }
    const mode = MODE_FOR[actionId];
    if (mode) {
      setOpen(prev => (prev && prev.id === item.id && prev.mode === mode) ? null : { id: item.id, mode });
      scrollTo(item.id, false);
      return;
    }
    complete(item, directMessage(item, actionId));
  };

  const renderRow = (item, i, len) => (
    <ActionRow key={item.id} item={item} openMode={open && open.id === item.id ? open.mode : null}
      onAction={onAction} onComplete={complete} onClose={() => setOpen(null)}
      innerRef={el => { rowRefs.current[item.id] = el; }} flash={flashId === item.id} last={i === len - 1} />
  );

  const toggleWidget = (id) => setHidden(h => ({ ...h, [id]: !h[id] }));
  const getPaidW = !hidden.get_paid && <Widget key="gp" title="Get paid" icon="dollar" tone="accent" items={byGroup('get_paid')} tabs={GET_PAID_TABS} addLabel="New invoice" onAdd={() => fireToast('Opening new invoice (demo)')} emptyTitle="Nothing to chase" emptySub="No invoices need sending or following up." renderRow={renderRow} onHide={() => toggleWidget('get_paid')} />;
  const reconcileW = !hidden.reconcile && <Widget key="rc" title="Reconcile" icon="bank" tone="blue" items={byGroup('reconcile')} addLabel="Import a statement" onAdd={() => fireToast('Import bank statement (demo)')} emptyTitle="Bank feed reconciled" emptySub="Every transaction is matched." renderRow={renderRow} onHide={() => toggleWidget('reconcile')} />;
  const healthW = !hidden.health && <BusinessHealthWidget key="hl" health={health} streak={PROFILE.streak} top={top} onJump={jumpTo} onHide={() => toggleWidget('health')} allClear={allClear} />;
  const tidyW = !hidden.tidy_up && <Widget key="td" title="Tidy up" icon="sparkle" tone="green" items={byGroup('tidy_up')} addLabel="Add an expense" onAdd={() => fireToast('Add expense (demo)')} emptyTitle="Books are tidy" emptySub="Expenses and assets are all sorted." renderRow={renderRow} onHide={() => toggleWidget('tidy_up')} />;

  const colStyle = { flex: 1, minWidth: 0, display: 'flex', flexDirection: 'column', gap: 16 };
  return (
    <div style={{ maxWidth: 1040, margin: '0 auto' }}>
      <Hero health={health} count={items.length} streak={PROFILE.streak}
        customizeOpen={customize} onCustomizeToggle={() => setCustomize(v => !v)}
        customizeProps={{ hidden, onToggle: toggleWidget, widgets: WIDGET_LIST }} />
      {allClear ? (
        <Celebration onNew={() => fireToast('Opening new invoice (demo)')} />
      ) : vp.oneCol ? (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>{getPaidW}{healthW}{reconcileW}{tidyW}</div>
      ) : (
        <div style={{ display: 'flex', gap: 16, alignItems: 'flex-start' }}>
          <div style={colStyle}>{getPaidW}{reconcileW}</div>
          <div style={colStyle}>{healthW}{tidyW}</div>
        </div>
      )}
    </div>
  );
};

    { id: 'transactions', label: 'Transactions', icon: 'repeat' },
    { id: 'sales', label: 'Sales', icon: 'dollar' },
    { id: 'expenses', label: 'Expenses', icon: 'receipt' },
    { id: 'assets', label: 'Assets', icon: 'layers' },
    { id: 'liab', label: 'Liabilities & Equity', icon: 'scale' },
    { id: 'contacts', label: 'Contacts', icon: 'users' },
    { id: 'reporting', label: 'Reporting Suite', icon: 'chartBar' },
    { id: 'migrations', label: 'Migrations', icon: 'gitMerge' } ],
  [ { id: 'projects', label: 'Projects / Milestones', icon: 'flow' },
    { id: 'scheduling', label: 'Scheduling', icon: 'calendar' },
    { id: 'time', label: 'Time Tracker', icon: 'clock' },
    { id: 'km', label: 'KM Tracker', icon: 'gauge' } ],
  [ { id: 'resources', label: 'Resources', icon: 'docs' },
    { id: 'growth', label: 'Growth & Marketing', icon: 'rocket' },
    { id: 'legal', label: 'Legal Help', icon: 'shield' },
    { id: 'refer', label: 'Refer & Earn $50', icon: 'handshake', accent: 'red' },
    { id: 'community', label: 'Sole Community', icon: 'smile' },
    { id: 'perks', label: 'Sole Perks', icon: 'star' },
    { id: 'tax', label: 'Tax Estimator', icon: 'percent' } ],
  [ { id: 'settings', label: 'Settings', icon: 'sliders' },
    { id: 'support', label: 'Support', icon: 'messageSquare' } ],
];

const Sidebar = ({ route, count, onNav, onStub }) => (
  <div style={{ width: 232, flexShrink: 0, height: '100vh', background: T.card, borderRight: `1px solid ${T.border}`, display: 'flex', flexDirection: 'column' }}>
    <div style={{ padding: '18px 20px 12px' }}><SoleLogo size={24} /></div>
    <div className="scroll-area" style={{ flex: 1, padding: '4px 12px', overflowY: 'auto' }}>
      {NAV.map((section, si) => (
        <div key={si} style={{ paddingBottom: 8, marginBottom: 8, borderBottom: si < NAV.length - 1 ? `1px solid ${T.borderSoft}` : 'none' }}>
          {section.map(item => {
            const active = item.route && route === item.route.replace('#/', '');
            return (
              <div key={item.id} data-hover={active ? undefined : 'nav'}
                onClick={() => item.route ? onNav(item.route) : onStub(item.label)}
                style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '7px 10px', borderRadius: 8, cursor: 'pointer', marginBottom: 1, background: active ? T.primarySoft : 'transparent', color: active ? T.primary : (item.accent === 'red' ? '#B91C1C' : T.textSoft), fontWeight: active ? 600 : 500, fontSize: 13 }}>
                <Icon name={item.icon} size={17} color={active ? T.primary : (item.accent === 'red' ? '#B91C1C' : T.muted)} />
                <span style={{ flex: 1, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{item.label}</span>
                {item.badge && count > 0 && (
                  <span style={{ background: active ? T.primary : T.red, color: '#fff', fontSize: 10.5, fontWeight: 700, borderRadius: 999, minWidth: 18, height: 18, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', padding: '0 5px' }}>{count}</span>
                )}
              </div>
            );
          })}
        </div>
      ))}
    </div>
    <div style={{ padding: '10px 14px', borderTop: `1px solid ${T.border}`, display: 'flex', alignItems: 'center', gap: 10 }}>
      <Avatar name={PROFILE.name} size={32} />
      <div style={{ minWidth: 0 }}>
        <div style={{ fontSize: 12.5, fontWeight: 600, color: T.text, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>Hi, {PROFILE.first} Williamson</div>
        <div style={{ fontSize: 11, color: T.muted, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{PROFILE.email}</div>
      </div>
    </div>
  </div>
);

const BellDropdown = ({ top, count, onPick, onOpenAll }) => (
  <div style={{ position: 'absolute', top: 40, right: 0, width: 320, background: T.card, border: `1px solid ${T.border}`, borderRadius: 12, boxShadow: T.shadowLg, zIndex: 80, overflow: 'hidden', animation: 'expand 0.14s ease' }}>
    <div style={{ padding: '11px 14px', borderBottom: `1px solid ${T.borderSoft}`, display: 'flex', alignItems: 'center', gap: 8 }}>
      <span style={{ fontSize: 13, fontWeight: 700, color: T.text }}>Needs your attention</span>
      <Pill color="red">{count}</Pill>
    </div>
    <div>
      {top.map(item => {
        const sev = SEV[item.severity];
        return (
          <div key={item.id} data-hover="row" onClick={() => onPick(item.id)} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 14px', cursor: 'pointer', borderBottom: `1px solid ${T.borderSoft}` }}>
            <IconChip icon={item.icon} tone={sev.tone} size={28} />
            <div style={{ minWidth: 0, flex: 1 }}>
              <div style={{ fontSize: 12.5, fontWeight: 600, color: T.text, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{item.rowTitle}</div>
              <div style={{ fontSize: 11, color: T.muted, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{item.sub}</div>
            </div>
          </div>
        );
      })}
    </div>
    <div onClick={onOpenAll} data-hover="row" style={{ padding: '10px 14px', textAlign: 'center', cursor: 'pointer', fontSize: 12.5, fontWeight: 600, color: T.primary }}>Open Unibox</div>
  </div>
);

const TopBar = ({ count, items, onFocusItem, onNav }) => {
  const [bell, setBell] = useState(false);
  const [period, setPeriod] = useState('fy');
  const top = rankItems(items).slice(0, 5);
  return (
    <div style={{ flexShrink: 0, background: T.card, borderBottom: `1px solid ${T.border}`, padding: '10px 20px', display: 'flex', alignItems: 'center', gap: 12 }}>
      <div style={{ position: 'relative', flex: '0 1 360px' }}>
        <span style={{ position: 'absolute', left: 10, top: '50%', transform: 'translateY(-50%)', display: 'inline-flex' }}><Icon name="search" size={15} color={T.mutedSoft} /></span>
        <input placeholder="Search or type a command" style={{ width: '100%', padding: '8px 40px 8px 32px', border: `1px solid ${T.border}`, borderRadius: 8, background: T.fieldBg, fontSize: 13 }} />
        <span style={{ position: 'absolute', right: 10, top: '50%', transform: 'translateY(-50%)', fontSize: 11, color: T.mutedSoft, border: `1px solid ${T.border}`, borderRadius: 5, padding: '1px 5px', background: T.card }}>⌘K</span>
      </div>
      <div style={{ flex: 1 }} />
      <Select value={period} onChange={e => setPeriod(e.target.value)} style={{ width: 140 }}>
        <option value="month">This month</option>
        <option value="quarter">This quarter</option>
        <option value="fy">This financial year</option>
      </Select>
      <Btn variant="soft" icon="calendar">Schedule support session</Btn>
      <div style={{ position: 'relative' }}>
        <Btn variant="iconOnly" icon="bell" onClick={() => setBell(v => !v)} title="Notifications" />
        {count > 0 && <span style={{ position: 'absolute', top: -3, right: -3, background: T.red, color: '#fff', fontSize: 10, fontWeight: 700, borderRadius: 999, minWidth: 16, height: 16, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', padding: '0 4px', border: `2px solid ${T.card}`, pointerEvents: 'none' }}>{count > 9 ? '9+' : count}</span>}
        {bell && <div onClick={() => setBell(false)} style={{ position: 'fixed', inset: 0, zIndex: 70 }} />}
        {bell && <BellDropdown top={top} count={count} onPick={(id) => { setBell(false); onFocusItem(id); }} onOpenAll={() => { setBell(false); onNav('#/unibox'); }} />}
      </div>
    </div>
  );
};

const AppShell = ({ route }) => {
  const [items, setItems] = useState(SEED_ITEMS);
  const [toast, setToast] = useState(null);
  const [focus, setFocus] = useState(null);
  const toastTimer = useRef();

  const fireToast = (t) => {
    const obj = typeof t === 'string' ? { message: t } : t;
    setToast(obj);
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(cur => cur === obj ? null : cur), obj.action ? 5000 : 2400);
  };
  const completeItem = (item, message) => {
    const idx = items.findIndex(i => i.id === item.id);
    setItems(prev => prev.filter(i => i.id !== item.id));
    fireToast({ message, tone: 'undo', action: { label: 'Undo', onClick: () => setItems(cur => { const arr = [...cur]; arr.splice(Math.min(idx, arr.length), 0, item); return arr; }) } });
  };
  const nav = (route) => { window.location.hash = route; };
  const stub = (label) => fireToast(`${label} isn't part of this prototype`);
  const focusItem = (id) => { if (route !== 'unibox') window.location.hash = '#/unibox'; setFocus({ id, nonce: (focus ? focus.nonce : 0) + 1 }); };

  return (
    <div style={{ display: 'flex', height: '100vh', overflow: 'hidden', background: T.bg }}>
      <Sidebar route={route} count={items.length} onNav={nav} onStub={stub} />
      <div style={{ flex: 1, minWidth: 0, display: 'flex', flexDirection: 'column' }}>
        <TopBar count={items.length} items={items} onFocusItem={focusItem} onNav={nav} />
        <div className="scroll-area" style={{ flex: 1, overflowY: 'auto' }}>
          <div style={{ maxWidth: 1120, margin: '0 auto', padding: '24px 28px 64px' }}>
            {route === 'dashboard'
              ? <DashboardStub count={items.length} onNav={nav} />
              : <UniboxScreen items={items} onComplete={completeItem} fireToast={fireToast} focus={focus} />}
          </div>
        </div>
      </div>
      <Toast toast={toast} onClose={() => setToast(null)} />
    </div>
  );
};

// --- root / render ---
const classify = (h) => (h || '').startsWith('#/dashboard') ? 'dashboard' : 'unibox';
const Root = () => {
  const [route, setRoute] = useState(() => classify(window.location.hash));
  useEffect(() => {
    if (!window.location.hash) window.history.replaceState(null, '', '#/unibox');
    const onHash = () => setRoute(classify(window.location.hash));
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);
  return <AppShell route={route} />;
};

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><Root /></ErrorBoundary>);
</script>
</body>
</html>
