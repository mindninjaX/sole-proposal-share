     v8 (automatic JSX runtime → import stmt → blank page). See docs/MEMORY.md. -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-size: 13px; line-height: 1.45; color: #0F1117; background: #F5F4F8;
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; font-size: inherit; cursor: pointer; }
  input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: #5B5BF6 !important; box-shadow: 0 0 0 3px rgba(91, 91, 246, 0.12); }
  button:focus-visible { outline: 2px solid #5B5BF6; outline-offset: 2px; }
  ::placeholder { color: #9CA3AF; }

  /* Hover states — inline styles can't express :hover, so interactive elements tag
     themselves with data-attrs and pick up treatments here. */
  button[data-btn]:not(:disabled) { transition: background 0.12s, border-color 0.12s, color 0.12s, box-shadow 0.12s, transform 0.05s; }
  button[data-btn]:not(:disabled):active { transform: translateY(0.5px); }
  button[data-btn="ghost"]:not(:disabled):hover          { background: #F9FAFB; border-color: #D1D5DB; }
  button[data-btn="soft"]:not(:disabled):hover           { background: #EEF0FF; border-color: #C7C9FB; }
  button[data-btn="primary"]:not(:disabled):hover        { background: #4F46E5; border-color: #4F46E5; box-shadow: 0 2px 8px rgba(79, 70, 229, 0.25); }
  button[data-btn="primaryOutline"]:not(:disabled):hover { background: #EEF0FF; }
  button[data-btn="iconOnly"]:not(:disabled):hover       { background: #F3F4F6; }
  button[data-btn="danger"]:not(:disabled):hover         { background: #DC2626; border-color: #DC2626; }
  [data-hover="row"]:not(:disabled)        { transition: background 0.1s; }
  [data-hover="row"]:not(:disabled):hover  { background: #F9FAFB; }
  [data-hover="nav"]                       { transition: background 0.1s, color 0.1s; }
  [data-hover="nav"]:hover                 { background: #F5F6FF; }
  [data-card="lift"]                       { transition: transform 0.12s ease, box-shadow 0.12s ease, border-color 0.12s ease; }
  [data-card="lift"]:hover                 { transform: translateY(-2px); border-color: #C7C9FB; box-shadow: 0 10px 24px -12px rgba(91,91,246,0.28), 0 1px 2px rgba(15,17,23,0.04); }
  button[data-chip]:not(:disabled):not([data-selected="true"]):hover { background: #F9FAFB; border-color: #D1D5DB; color: #1F2937; }
  .scroll-area { overflow-y: auto; }
  .scroll-area::-webkit-scrollbar { width: 8px; height: 8px; }
  .scroll-area::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 4px; }
  .scroll-area::-webkit-scrollbar-track { background: transparent; }

  @keyframes slidein { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes fadein  { from { opacity: 0; } to { opacity: 1; } }
  @keyframes expand  { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin    { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes rowflash { 0% { box-shadow: 0 0 0 0 rgba(91,91,246,0); } 30% { box-shadow: 0 0 0 4px rgba(91,91,246,0.28); } 100% { box-shadow: 0 0 0 0 rgba(91,91,246,0); } }
  @keyframes ringpop { 0% { transform: scale(1); } 45% { transform: scale(1.06); } 100% { transform: scale(1); } }
  @keyframes confettiFall { 0% { transform: translateY(-12vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(104vh) rotate(680deg); opacity: 0.85; } }
  @keyframes sheetin { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes flamepop { 0% { transform: scale(1); } 40% { transform: scale(1.4); } 100% { transform: scale(1); } }
  @keyframes barrise { from { transform: scaleY(0.02); } to { transform: scaleY(1); } }
  /* Quiet inline actions — one bordered primary, secondaries reveal on row hover (Notion/Gmail). */
  .ub-qbtn { transition: background .12s, border-color .12s, color .12s; }
  .ub-qbtn:hover { background: #F9FAFB; border-color: #D1D5DB; }
  .ub-qlink:hover { background: #F3F4F6; color: #1F2937 !important; }
</style>

const ICONCHIP_TONES = {
  accent:  { bg: T.primarySoft, fg: T.primary,   grad: 'linear-gradient(135deg, #5A4FCF 0%, #4A3FBE 100%)', shadow: 'rgba(74,63,190,0.5)' },
  green:   { bg: T.greenSoft,   fg: T.greenDark, grad: 'linear-gradient(135deg, #34D399 0%, #059669 100%)', shadow: 'rgba(5,150,105,0.42)' },
  amber:   { bg: T.amberSoft,   fg: T.amber,     grad: 'linear-gradient(135deg, #FBBF24 0%, #D97706 100%)', shadow: 'rgba(217,119,6,0.42)' },
  blue:    { bg: T.blueSoft,    fg: T.blue,      grad: 'linear-gradient(135deg, #60A5FA 0%, #2563EB 100%)', shadow: 'rgba(37,99,235,0.42)' },
  red:     { bg: T.redSoft,     fg: T.red,       grad: 'linear-gradient(135deg, #F87171 0%, #DC2626 100%)', shadow: 'rgba(220,38,38,0.42)' },
  neutral: { bg: T.fieldBg,     fg: T.muted,     grad: 'linear-gradient(135deg, #9CA3AF 0%, #6B7280 100%)', shadow: 'rgba(107,114,128,0.36)' },
};
const IconChip = ({ icon, tone = 'accent', size = 36, style, gradient }) => {
  const t = ICONCHIP_TONES[tone] || ICONCHIP_TONES.accent;
  const bg = gradient ? t.grad : t.bg;
  const fg = gradient ? '#fff' : t.fg;
  return (
    <div style={{ width: size, height: size, borderRadius: Math.round(size * 0.29), background: bg, color: fg, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, boxShadow: gradient ? `0 6px 14px -6px ${t.shadow}` : undefined, ...style }}>
      <Icon name={icon} size={Math.round(size * 0.5)} color={fg} />
    </div>
  );
};

// --- atoms (copied from index.html) ---
const Card = ({ children, style, padded = true, hover, onClick }) => (
  <div data-card={hover ? 'lift' : 'base'} onClick={onClick} style={{
    background: T.card, border: `1px solid ${T.borderSoft}`, borderRadius: T.radiusCard,
    boxShadow: T.shadowSm, padding: padded ? T.space.lg : 0, ...style
  }}>{children}</div>
);
const Label = ({ children, style }) => (<div style={{ fontSize: 12, fontWeight: 500, color: T.textSoft, marginBottom: 6, ...style }}>{children}</div>);
const SectionTitle = ({ children, style }) => (<div style={{ fontSize: 14, fontWeight: 600, color: T.text, ...style }}>{children}</div>);
const Helper = ({ children, style }) => (<div style={{ fontSize: 12, color: T.muted, ...style }}>{children}</div>);

const StatCard = ({ icon, tone = 'accent', label, value, sub, delta, deltaTone, onClick, style }) => (
  <div onClick={onClick} style={{ background: T.card, border: `1px solid ${T.borderSoft}`, borderRadius: T.radiusCard, boxShadow: T.shadowSm, padding: '13px 15px', display: 'flex', flexDirection: 'column', cursor: onClick ? 'pointer' : 'default', minWidth: 0, ...style }}>
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 8 }}>
      {icon && <IconChip icon={icon} tone={tone} size={32} gradient />}
      {delta != null && <span style={{ fontSize: 11.5, fontWeight: 700, color: deltaTone === 'down' ? T.red : T.greenDark }}>{deltaTone === 'down' ? '▼' : '▲'} {delta}</span>}
    </div>
    <div style={{ fontSize: 11.5, fontWeight: 600, color: T.muted, marginTop: 11 }}>{label}</div>
    <div style={{ fontSize: 22, fontWeight: 800, color: T.text, letterSpacing: -0.4, fontVariantNumeric: 'tabular-nums', marginTop: 2, lineHeight: 1.15 }}>{value}</div>
    {sub && <div style={{ fontSize: 11.5, color: T.muted, marginTop: 3 }}>{sub}</div>}
  </div>
);

const PageHead = ({ title, subtitle, actions, style }) => (
  <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 16, flexWrap: 'wrap', marginBottom: 18, ...style }}>
    <div style={{ minWidth: 0 }}>
      <div style={{ fontSize: 22, fontWeight: 800, color: T.text, letterSpacing: -0.4 }}>{title}</div>
      {subtitle && <Helper style={{ fontSize: 13, marginTop: 3 }}>{subtitle}</Helper>}
    </div>
    {actions && <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>{actions}</div>}
  </div>
);

const BANNER_TONES = {
  success: { bg: T.greenSoft,     bd: '#A7F3D0', fg: T.greenDark, icon: 'checkCircle' },
  info:    { bg: T.blueSoft,      bd: '#BFDBFE', fg: T.blue,      icon: 'info' },
  accent:  { bg: T.primarySofter, bd: '#C7C9FB', fg: T.primary,   icon: 'sparkle' },
  warn:    { bg: T.amberSoft,     bd: '#FCD34D', fg: '#92400E',   icon: 'alertTriangle' },
  danger:  { bg: T.redSoft,       bd: '#FECACA', fg: '#991B1B',   icon: 'alertTriangle' },
};
const Banner = ({ tone = 'info', title, children, icon, action, style }) => {
  const t = BANNER_TONES[tone] || BANNER_TONES.info;

// --- confetti (dependency-free reward burst; single ref'd timer; honours reduced motion) ---
const CONFETTI_COLORS = [T.primary, T.green, T.amber, '#EC4899', T.blue];
const prefersReducedMotion = () => typeof window !== 'undefined' && window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const Confetti = ({ fire, big }) => {
  const [pieces, setPieces] = useState(null);
  const timer = useRef();
  useEffect(() => {
    if (!fire || prefersReducedMotion()) return;   // no particles for reduced-motion users
    const n = big ? 90 : 40;
    setPieces(Array.from({ length: n }, (_, i) => ({
      key: fire + '-' + i,
      left: Math.random() * 100,
      bg: CONFETTI_COLORS[i % CONFETTI_COLORS.length],
      w: 6 + Math.random() * 6, h: 8 + Math.random() * 8,
      delay: Math.random() * (big ? 0.35 : 0.2),
      dur: (big ? 1.5 : 1.1) + Math.random() * 0.5,
      rot: Math.random() * 360,
    })));
    clearTimeout(timer.current);
    timer.current = setTimeout(() => setPieces(null), big ? 2200 : 1700);
    return () => clearTimeout(timer.current);
  }, [fire]);
  if (!pieces) return null;
  return (
    <div style={{ position: 'fixed', inset: 0, pointerEvents: 'none', zIndex: 280, overflow: 'hidden' }} aria-hidden="true">
      {pieces.map(p => (
        <span key={p.key} style={{ position: 'absolute', top: 0, left: p.left + '%', width: p.w, height: p.h, background: p.bg, borderRadius: 2, transform: `rotate(${p.rot}deg)`, animation: `confettiFall ${p.dur}s ease-in ${p.delay}s forwards` }} />
      ))}
    </div>
  );
};

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) { console.error('Render crash:', error, info); }
  render() {
    if (this.state.error) {
      return (<div style={{ padding: 24, margin: 24, border: `1px solid ${T.red}`, borderRadius: 12, background: T.redSoft, color: T.red, fontFamily: 'monospace', fontSize: 12 }}>
        <div style={{ fontWeight: 700, marginBottom: 8 }}>⚠ Render crashed</div>
        <div>{String(this.state.error?.message || this.state.error)}</div>
        <pre style={{ marginTop: 10, fontSize: 11, whiteSpace: 'pre-wrap' }}>{this.state.error?.stack}</pre>
      </div>);
    }
    return this.props.children;
  }
}

// --- gamification: tiers (all-time actions) + streak + activity history ---
const TIERS = [
  { name: 'Starter',   min: 0,   icon: 'sparkle' },
  { name: 'Regular',   min: 10,  icon: 'flame' },
  { name: 'Sharp',     min: 50,  icon: 'target' },

  { name: 'Sole star', min: 350, icon: 'star' },
];
const tierFor = (n) => {
  let i = 0;
  for (let k = 0; k < TIERS.length; k++) if (n >= TIERS[k].min) i = k;
  const tier = TIERS[i];
  const next = TIERS[i + 1] || null;
  const toNext = next ? next.min - n : 0;
  const span = next ? next.min - tier.min : 1;
  const progress = next ? clamp((n - tier.min) / span, 0, 1) : 1;
  return { tier, next, toNext, progress };
};
const DAILY_MILESTONES = [3, 5, 10];

const DAY_MS = 86400000;
const startOfDay = (ts) => { const d = new Date(ts); d.setHours(0, 0, 0, 0); return d.getTime(); };
// Seed ~2 weeks of prior activity (none today, so clearing the first item today
// visibly extends the streak). Counts are per-day-ago; index 0 = today.
const ACTIVITY_BY_DAY = [0, 2, 3, 1, 2, 2, 1, 2, 1, 2, 1, 1, 2];
const SEED_LABELS = ['Sent an invoice', 'Matched a bank transaction', 'Categorised an expense', 'Followed up an overdue invoice', 'Sent a payment reminder', 'Recorded a new asset', 'Attached a receipt'];
const SEED_ACTIVITY = (() => {
  const now = Date.now(); const out = [];
  ACTIVITY_BY_DAY.forEach((cnt, ago) => {
    for (let k = 0; k < cnt; k++) out.push({ ts: now - ago * DAY_MS - (k + 1) * 3600000, kind: 'done', label: SEED_LABELS[(ago + k) % SEED_LABELS.length] });
  });
  return out;
})();
const computeStreak = (activity) => {
  const days = new Set(activity.map(a => startOfDay(a.ts)));
  let d = startOfDay(Date.now()); let streak = 0;
  if (!days.has(d)) d -= DAY_MS;          // today empty → count up to yesterday
  while (days.has(d)) { streak++; d -= DAY_MS; }
  return streak;
};
const computeProgress = (activity) => {
  const today0 = startOfDay(Date.now());
  const counts = {};
  activity.forEach(a => { const ago = Math.round((today0 - startOfDay(a.ts)) / DAY_MS); counts[ago] = (counts[ago] || 0) + 1; });
  const last7 = []; for (let i = 6; i >= 0; i--) last7.push(counts[i] || 0);
  let thisWeek = 0, prevWeek = 0;
  for (let i = 0; i < 7; i++) thisWeek += counts[i] || 0;
  for (let i = 7; i < 14; i++) prevWeek += counts[i] || 0;
  return { today: counts[0] || 0, yesterday: counts[1] || 0, thisWeek, prevWeek, last7, streak: computeStreak(activity) };
};

const STREAK_DEF = "Days in a row you've checked in and cleared at least one thing. It never counts down — quieter days simply don't add to it.";

// --- health score (deterministic; encouraging floor; never 0) ---
function computeHealth(items, streak = 0, isNew = false) {
  const penalty = items.reduce((s, it) => s + (it.weight || 0), 0);
  const streakBonus = Math.min(streak || 0, 5);
  const floor = isNew ? 72 : 40;
  let score = clamp(Math.round(Math.max(floor, 100 - penalty + streakBonus)), 1, 100);
  let band, label, tail;
  if (score >= 80)      { band = 'green'; label = 'In the green';         tail = "you're in great shape 🎉"; }
  else if (score >= 60) { band = 'amber'; label = 'A few things to tidy';  tail = "you're in good shape 👍"; }
  else                  { band = 'red';   label = 'Needs attention';       tail = "let's knock a few out"; }
  return { score, band, label, tail };
}

const useViewport = () => {
  const [w, setW] = useState(typeof window !== 'undefined' ? window.innerWidth : 1280);
  useEffect(() => { const on = () => setW(window.innerWidth); window.addEventListener('resize', on); return () => window.removeEventListener('resize', on); }, []);

};

// Row overflow menu — an always-visible ⋯ that opens the secondary actions. Rendered

const RowMenu = ({ actions, onPick }) => {
  const [open, setOpen] = useState(false);
  const [pos, setPos] = useState({ top: 0, right: 0 });
  const btnRef = useRef(null);
  if (!actions || !actions.length) return null;
  const toggle = () => {
    if (open) { setOpen(false); return; }
    const r = btnRef.current.getBoundingClientRect();
    setPos({ top: r.bottom + 6, right: Math.max(8, window.innerWidth - r.right) });
    setOpen(true);
  };
  return (
    <React.Fragment>
      <button ref={btnRef} className="ub-qbtn" title="More actions" onClick={toggle}
        style={{ border: `1px solid ${T.border}`, background: T.card, borderRadius: 6, padding: '0 6px', height: 30, display: 'inline-flex', alignItems: 'center', cursor: 'pointer', color: T.muted, flexShrink: 0 }}>

      {open && (
        <React.Fragment>
          <div onClick={() => setOpen(false)} style={{ position: 'fixed', inset: 0, zIndex: 210 }} />
          <div style={{ position: 'fixed', top: pos.top, right: pos.right, minWidth: 168, background: T.card, border: `1px solid ${T.border}`, borderRadius: 10, boxShadow: T.shadowLg, zIndex: 211, overflow: 'hidden', animation: 'expand .14s ease' }}>
            {actions.map(a => (

};

const Widget = ({ title, icon, addLabel, addActions, items, tabs, emptyTitle, renderRow }) => {
  const [tab, setTab] = useState(tabs ? tabs[0].id : null);
  const [all, setAll] = useState(false);
  const activeTab = tabs ? (tabs.find(t => t.id === tab) || tabs[0]) : null;
  const list = activeTab ? items.filter(activeTab.filter) : items;
  const counts = tabs ? Object.fromEntries(tabs.map(t => [t.id, items.filter(t.filter).length])) : {};
  const shown = all ? list : list.slice(0, 3);
  return (
    <div className="ub-widget" style={{ background: T.card, border: `1px solid ${T.borderSoft}`, borderRadius: 14, boxShadow: T.shadowSm, overflow: 'hidden' }}>
      <WidgetHead icon={icon} title={title} count={items.length} addLabel={addLabel} addActions={addActions} />
      {tabs && <WidgetTabs tabs={tabs} value={activeTab ? activeTab.id : tab} onChange={t => { setTab(t); setAll(false); }} counts={counts} />}
      {list.length === 0 ? (
        <div style={{ display: 'flex', alignItems: 'center', gap: 9, padding: '12px 14px 16px', color: T.muted }}>
          <Icon name="check" size={15} color={T.greenDark} strokeWidth={2.4} />

        </div>
      ) : shown.map((item, i) => renderRow(item, i, shown.length))}
      {list.length > 3 && <ShowMore all={all} onToggle={() => setAll(a => !a)} count={list.length - 3} />}
    </div>
  );
};

  const ago = Math.round((startOfDay(Date.now()) - startOfDay(ts)) / DAY_MS);
  return ago <= 0 ? 'Today' : ago === 1 ? 'Yesterday' : ago + ' days ago';
};
const dayLetter = (ago) => 'SMTWTFS'[new Date(startOfDay(Date.now()) - ago * DAY_MS).getDay()];

const GET_PAID_TABS = [
  { id: 'quotes', label: 'Quotes', filter: i => i.type === 'quote' },
  { id: 'send', label: 'To send', filter: i => i.type === 'send_invoice' },
  { id: 'overdue', label: 'Overdue', filter: i => i.type === 'overdue_invoice' },
  { id: 'due', label: 'Due soon', filter: i => i.type === 'due_soon' },
];
const WIDGET_LABELS = { get_paid: 'Get paid', health: 'Business health', reconcile: 'Bank feed', expenses: 'Expenses', assets: 'Assets', liabilities: 'Liabilities & equity', upcoming: 'Work coming up', keydates: 'Key dates', progress: 'Your progress' };

const UniboxScreen = ({ items, activeModules, reg, personaId, onSetPersona, progress, activity, allTime, onComplete, fireToast, focus, isMobile }) => {
  const [open, setOpen] = useState(null);            // inline panel { id, mode }
  const [matchItem, setMatchItem] = useState(null);  // the Match window
  const [flashId, setFlashId] = useState(null);
  const [hidden, setHidden] = useState({});          // { [widgetId]: true }
  const [customize, setCustomize] = useState(false);
  const rowRefs = useRef({});
  // Column count is driven by the ACTUAL content width (not the window — the sidebar
  // steals width), measured live so columns never get too narrow to read. LANDMINE:
  // never derive this from window.innerWidth / useViewport — see docs/MEMORY.md.
  const wrapRef = useRef(null);
  const [cw, setCw] = useState(1120);
  useEffect(() => {
    const el = wrapRef.current;
    if (!el || typeof ResizeObserver === 'undefined') return;
    const ro = new ResizeObserver(es => { for (const e of es) setCw(e.contentRect.width); });
    ro.observe(el);
    setCw(el.getBoundingClientRect().width);
    return () => ro.disconnect();
  }, []);
  const cols = cw >= 900 ? 2 : 1;   // 2-col only when each column is wide enough for a full single-line row

  const has = (m) => activeModules.includes(m);
  const health = useMemo(() => computeHealth(items, progress.streak, PROFILE.isNew), [items, progress.streak]);
  const ranked = useMemo(() => rankItems(items), [items]);
  const byModule = (mods) => ranked.filter(i => mods.includes(i.module));
  const top = ranked.slice(0, 3);
  const tier = tierFor(allTime).tier;
  const recent = activity.slice(0, 5);
  const allClear = items.length === 0;

  const widgetIdForItem = (it) => it.module === 'bankfeed' ? 'reconcile' : it.module === 'expenses' ? 'expenses' : it.module === 'assets' ? 'assets' : 'get_paid';

  const scrollTo = (id, flash) => setTimeout(() => {
    const el = rowRefs.current[id];
    if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); if (flash) { setFlashId(id); setTimeout(() => setFlashId(null), 1400); } }
  }, 60);

  // Bell deep-link: reveal the item's widget and scroll+flash its row.
  useEffect(() => {
    if (!focus || !focus.id) return;
    const it = items.find(i => i.id === focus.id);
    if (it) { setHidden(h => ({ ...h, [widgetIdForItem(it)]: false })); scrollTo(focus.id, true); }
  }, [focus && focus.nonce]);

  const complete = (item, message, kind = 'done') => { onComplete(item, message, kind); setOpen(null); setMatchItem(null); };
  const jumpTo = (id) => { const it = items.find(x => x.id === id); if (it) setHidden(h => ({ ...h, [widgetIdForItem(it)]: false })); scrollTo(id, true); };
  const onAction = (item, actionId) => {
    if (actionId === 'preview') { fireToast('Opening invoice preview (demo)'); return; }
    if (MATCH_ACTIONS.includes(actionId)) { setMatchItem(item); return; }   // → the Match window
    const mode = MODE_FOR[actionId];
    if (mode) {
      setOpen(prev => (prev && prev.id === item.id && prev.mode === mode) ? null : { id: item.id, mode });
      scrollTo(item.id, false);
      return;
    }
    complete(item, directMessage(item, actionId), 'done');
  };
  const confirmMatch = (item) => complete(item, item.amountTone === 'in' ? `Matched ${fmtMoney(item.amount)} to ${item.invoiceNo || 'your books'}` : `Matched ${fmtMoney(item.amount)} — reconciled`, 'match');
  const rejectMatch = (item) => complete(item, "We'll leave this one for you to match", 'skip');

  const renderRow = (item, i, len) => (
    <ActionRow key={item.id} item={item} openMode={open && open.id === item.id ? open.mode : null}
      onAction={onAction} onComplete={complete} onClose={() => setOpen(null)}
      innerRef={el => { rowRefs.current[item.id] = el; }} flash={flashId === item.id} last={i === len - 1} isMobile={isMobile} />
  );

  const toggleWidget = (id) => setHidden(h => ({ ...h, [id]: !h[id] }));

  // Get paid adapts to modules: the Quotes tab + a "New quote" action only when quotes is in use.
  const getPaidTabs = GET_PAID_TABS.filter(t => t.id !== 'quotes' || has('quotes'));
  const getPaidItems = byModule(has('quotes') ? ['sales', 'quotes'] : ['sales']);
  const getPaidW = <Widget key="gp" title="Get paid" icon="dollar" items={getPaidItems} tabs={getPaidTabs}
    addLabel="New" addActions={[{ label: 'New invoice', onClick: () => fireToast('Opening new invoice (demo)') }].concat(has('quotes') ? [{ label: 'New quote', onClick: () => fireToast('Starting a new quote (demo)') }] : [])}
    emptyTitle="Nothing to chase right now." renderRow={renderRow} />;
  const bankfeedW = <Widget key="rc" title="Bank feed" icon="bank" items={byModule(['bankfeed'])}
    addActions={[{ label: 'Import', onClick: () => fireToast('Import bank statement (demo)') }]}
    emptyTitle="Every transaction is matched." renderRow={renderRow} />;
  const expensesW = <Widget key="ex" title="Expenses" icon="receipt" items={byModule(['expenses'])}
    addLabel="Log" addActions={[{ label: 'Log expense', onClick: () => fireToast('Log a new expense (demo)') }]}
    emptyTitle="Expenses are all sorted." renderRow={renderRow} />;
  const assetsW = <Widget key="as" title="Assets" icon="layers" items={byModule(['assets'])}
    addLabel="Log" addActions={[{ label: 'Log asset', onClick: () => fireToast('Log a new asset (demo)') }]}
    emptyTitle="Assets are all recorded." renderRow={renderRow} />;
  const upcomingW = <UpcomingWidget key="up" fireToast={fireToast} isMobile={isMobile} />;
  const keyDatesW = <KeyDatesWidget key="kd" fireToast={fireToast} reg={reg} isMobile={isMobile} />;
  const liabilitiesW = <LiabilitiesWidget key="li" fireToast={fireToast} isMobile={isMobile} />;
  const healthW = <HealthCard key="hl" health={health} streak={progress.streak} top={top} onJump={jumpTo} allClear={allClear} />;
  const progressW = <ProgressCard key="pr" progress={progress} allTime={allTime} recent={recent} />;

  // Module-adaptive home: only surface widgets for modules this business uses.
  const WIDGETS = [
    { id: 'get_paid', el: getPaidW, show: has('sales') || has('quotes') },
    { id: 'health', el: healthW, show: true },
    { id: 'reconcile', el: bankfeedW, show: has('bankfeed') },
    { id: 'expenses', el: expensesW, show: has('expenses') },
    { id: 'upcoming', el: upcomingW, show: has('booking') },
    { id: 'progress', el: progressW, show: true },
    { id: 'assets', el: assetsW, show: has('assets') },
    { id: 'liabilities', el: liabilitiesW, show: has('liabilities') },
    { id: 'keydates', el: keyDatesW, show: has('sales') || has('liabilities') },
  ];
  const available = WIDGETS.filter(w => w.show);
  const bento = available.filter(w => !hidden[w.id]);
  const columns = Array.from({ length: cols }, () => []);
  bento.forEach((w, i) => columns[i % cols].push(w.el));
  const customiseList = available.map(w => ({ id: w.id, label: WIDGET_LABELS[w.id] }));

  return (
    <div ref={wrapRef}>
      <Hero health={health} count={items.length} streak={progress.streak} tier={tier} isMobile={isMobile}
        personaProps={{ personaId, personas: PERSONAS, onSet: onSetPersona }}
        customizeOpen={customize} onCustomizeToggle={() => setCustomize(v => !v)}
        customizeProps={{ hidden, onToggle: toggleWidget, widgets: customiseList }} />
      {allClear
        ? <Celebration onNew={() => fireToast('Starting a new invoice (demo)')} />
        : <div style={{ display: 'flex', gap: 20, alignItems: 'flex-start' }}>
            {columns.map((col, ci) => <div key={ci} style={{ flex: 1, minWidth: 0, display: 'flex', flexDirection: 'column', gap: 20 }}>{col}</div>)}
          </div>}
      <MatchModal item={matchItem} isMobile={isMobile} onClose={() => setMatchItem(null)} onConfirm={confirmMatch} onReject={rejectMatch} />
    </div>
  );
};

const AppShell = ({ route }) => {
  const { isMobile } = useViewport();
  const [items, setItems] = useState(SEED_ITEMS);
  const [activity, setActivity] = useState(SEED_ACTIVITY);
  const [allTime, setAllTime] = useState(PROFILE.actionsAllTime);
  const [personaId, setPersonaId] = useState(PROFILE.persona);
  const [toast, setToast] = useState(null);
  const [focus, setFocus] = useState(null);
  const [burst, setBurst] = useState({ n: 0, big: false });
  const [navOpen, setNavOpen] = useState(false);
  const toastTimer = useRef();
  const burstN = useRef(0);

  useEffect(() => { setNavOpen(false); }, [route]);   // close the mobile drawer on navigation

  const persona = personaById(personaId);
  const activeModules = persona.modules;
  const reg = persona.reg;
  const visibleItems = useMemo(() => items.filter(i => activeModules.includes(i.module)), [items, personaId]);
  const progress = useMemo(() => computeProgress(activity), [activity]);

  const fireToast = (t) => {
    const obj = typeof t === 'string' ? { message: t } : t;
    setToast(obj);
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(cur => cur === obj ? null : cur), obj.action ? 5000 : 2400);
  };
  const fireBurst = (big) => { burstN.current += 1; setBurst({ n: burstN.current, big: !!big }); };

  // Complete an action: remove it, log it to activity, bump the all-time count, then
  // celebrate (confetti + copy) on the first-of-day streak, a daily/tier milestone, or all-clear.
  const completeItem = (item, message, kind = 'done') => {
    const idx = items.findIndex(i => i.id === item.id);
    const entry = { ts: Date.now(), kind, label: message };
    const nextActivity = [entry, ...activity];
    const prevP = progress, nextP = computeProgress(nextActivity);
    const prevTier = tierFor(allTime).tier.name, nextTier = tierFor(allTime + 1).tier.name;
    const remaining = visibleItems.filter(i => i.id !== item.id).length;
    let msg = message, big = false, note = null;
    if (nextTier !== prevTier) { big = true; note = `Nice work — you've reached ${nextTier}`; }
    else { for (const m of DAILY_MILESTONES) if (prevP.today < m && nextP.today >= m) { big = true; note = `${m} done today — you're on a roll!`; break; } }
    if (remaining === 0) { big = true; if (!note) note = "That's everything actioned — you're all clear ✨"; }
    if (note) msg = note;
    else if (prevP.today === 0 && nextP.today >= 1) msg = `${message} · 🔥 ${nextP.streak}-day streak`;

    setItems(prev => prev.filter(i => i.id !== item.id));
    setActivity(nextActivity);
    setAllTime(a => a + 1);
    fireBurst(big);
    fireToast({ message: msg, tone: 'undo', action: { label: 'Undo', onClick: () => {
      setItems(cur => { const arr = [...cur]; arr.splice(Math.min(idx, arr.length), 0, item); return arr; });
      setActivity(cur => cur.filter(a => a !== entry));
      setAllTime(a => Math.max(0, a - 1));
    } } });
  };
  const nav = (route) => { window.location.hash = route; };
  const stub = (label) => fireToast(`${label} isn't part of this prototype`);
  const focusItem = (id) => { if (route !== 'unibox') window.location.hash = '#/unibox'; setFocus({ id, nonce: (focus ? focus.nonce : 0) + 1 }); };
  const setPersona = (id) => { setPersonaId(id); setFocus(null); };

  return (
    <div style={{ display: 'flex', height: '100vh', overflow: 'hidden', background: T.bg, position: 'relative' }}>
      <Sidebar route={route} count={visibleItems.length} onNav={nav} onStub={stub} isMobile={isMobile} mobileOpen={navOpen} onClose={() => setNavOpen(false)} />
      <div style={{ flex: 1, minWidth: 0, display: 'flex', flexDirection: 'column' }}>
        <TopBar count={visibleItems.length} items={visibleItems} onFocusItem={focusItem} onNav={nav} isMobile={isMobile} onOpenNav={() => setNavOpen(true)} />
        <div className="scroll-area" style={{ flex: 1, overflowY: 'auto', background: route === 'unibox' ? UNIBOX_CANVAS : T.bg }}>
          <div style={{ maxWidth: route === 'unibox' ? 1140 : 1560, margin: '0 auto', padding: isMobile ? '20px 16px 56px' : (route === 'unibox' ? '34px 28px 64px' : '24px 30px 56px') }}>
            {route === 'dashboard'
              ? <DashboardStub count={visibleItems.length} onNav={nav} />
              : <UniboxScreen items={visibleItems} activeModules={activeModules} reg={reg} personaId={personaId} onSetPersona={setPersona}
                  progress={progress} activity={activity} allTime={allTime}
                  onComplete={completeItem} fireToast={fireToast} focus={focus} isMobile={isMobile} />}
          </div>
        </div>
      </div>
      <Toast toast={toast} onClose={() => setToast(null)} />
      <Confetti fire={burst.n} big={burst.big} />
    </div>
  );
};

// --- root / render ---
const classify = (h) => (h || '').startsWith('#/dashboard') ? 'dashboard' : 'unibox';
const Root = () => {
  const [route, setRoute] = useState(() => classify(window.location.hash));
  useEffect(() => {
    if (!window.location.hash) window.history.replaceState(null, '', '#/unibox');
    const onHash = () => setRoute(classify(window.location.hash));
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);
  return <AppShell route={route} />;
};

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><Root /></ErrorBoundary>);
</script>
</body>
</html>
