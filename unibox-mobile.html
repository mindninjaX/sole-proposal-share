    * { box-sizing: border-box; }

      position: relative;
      width: min(404px, 100vw - 24px);

    @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

const DAY_MS = 86400000;
const startOfDay = (ts) => { const d = new Date(ts); d.setHours(0, 0, 0, 0); return d.getTime(); };

const SEED_ACTIVITY = (() => {
  const now = Date.now(); const out = [];
  ACTIVITY_BY_DAY.forEach((cnt, ago) => { for (let k = 0; k < cnt; k++) out.push({ ts: now - ago * DAY_MS - (k + 1) * 3600000, kind: 'done', label: SEED_LABELS[(ago + k) % SEED_LABELS.length] }); });
  return out;
})();
const computeStreak = (activity) => {
  const days = new Set(activity.map(a => startOfDay(a.ts)));
  let d = startOfDay(Date.now()); let streak = 0;
  if (!days.has(d)) d -= DAY_MS;
  while (days.has(d)) { streak++; d -= DAY_MS; }
  return streak;
};
const computeProgress = (activity) => {
  const today0 = startOfDay(Date.now()); const counts = {};
  activity.forEach(a => { const ago = Math.round((today0 - startOfDay(a.ts)) / DAY_MS); counts[ago] = (counts[ago] || 0) + 1; });
  return { today: counts[0] || 0, streak: computeStreak(activity) };
};

function computeHealth(items, streak = 0) {
  const penalty = items.reduce((s, it) => s + (it.weight || 0), 0);
  const score = clamp(Math.round(Math.max(40, 100 - penalty + Math.min(streak || 0, 5))), 1, 100);
  let band, label;
  if (score >= 80) { band = 'green'; label = 'In the green'; }
  else if (score >= 60) { band = 'amber'; label = 'A few things to tidy'; }
  else { band = 'red'; label = 'Needs attention'; }
  return { score, band, label };
}

// health ring — stroke scales with size (ported fix); score-only when small
const HealthRing = ({ score, band, size = 60, celebrate }) => {
  const stroke = Math.max(4, Math.round(size * 0.1)), compact = size < 66;

// confetti — confined to the phone frame (position:absolute)
const CONFETTI_COLORS = [T.primary, T.green, T.amber, '#EC4899', T.blue];
const reduce = () => typeof window !== 'undefined' && window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const Confetti = ({ fire, big }) => {
  const [pieces, setPieces] = useState(null); const timer = useRef();
  useEffect(() => {
    if (!fire || reduce()) return;
    const n = big ? 80 : 36;
    setPieces(Array.from({ length: n }, (_, i) => ({ key: fire + '-' + i, left: Math.random() * 100, bg: CONFETTI_COLORS[i % CONFETTI_COLORS.length], w: 6 + Math.random() * 5, h: 8 + Math.random() * 7, delay: Math.random() * (big ? 0.3 : 0.18), dur: (big ? 1.4 : 1.05) + Math.random() * 0.5, rot: Math.random() * 360 })));
    clearTimeout(timer.current); timer.current = setTimeout(() => setPieces(null), big ? 2100 : 1600);
    return () => clearTimeout(timer.current);
  }, [fire]);
  if (!pieces) return null;
  return <div style={{ position: 'absolute', inset: 0, pointerEvents: 'none', zIndex: 60, overflow: 'hidden' }} aria-hidden="true">{pieces.map(p => <span key={p.key} style={{ position: 'absolute', top: -10, left: p.left + '%', width: p.w, height: p.h, background: p.bg, borderRadius: 2, animation: `confettiFall ${p.dur}s ease-in ${p.delay}s forwards` }} />)}</div>;
};

// Card deck: swipe the top card to send it BELOW the stack (next rises to front). It works
// a finite BATCH of up to 5 that DEPLETES as you resolve (dots go down); when the batch is
// cleared it loads the next 5. Browse-only — the CTAs below act on the front card.
const CARD_H = 210;
const SwipeDeck = ({ items, onAction }) => {
  const [batch, setBatch] = useState(() => items.slice(0, 5).map(i => i.id));   // stable snapshot order
  const [pos, setPos] = useState(0);                                            // which batch card is front (cycles)
  const [dx, setDx] = useState(0);
  const [dragging, setDragging] = useState(false);
  const start = useRef(null);
  // remove resolved ids; when the batch empties, load the next 5 most-urgent
  useEffect(() => {
    const ids = new Set(items.map(i => i.id));
    setBatch(prev => {
      const kept = prev.filter(id => ids.has(id));
      if (kept.length === 0 && items.length > 0) { setPos(0); return items.slice(0, 5).map(i => i.id); }
      return kept;
    });
  }, [items]);
  const byId = {}; items.forEach(i => { byId[i.id] = i; });
  const cards = batch.map(id => byId[id]).filter(Boolean);
  useEffect(() => { setPos(p => (cards.length ? p % cards.length : 0)); }, [cards.length]);
  if (!cards.length) return null;
  const n = cards.length;
  const f = pos % n;
  const front = cards[f];
  const isRed = (id) => id === 'not_match' || id === 'ignore' || id === 'not_asset';
  const onDown = (e) => { if (n < 2) return; start.current = e.clientX; setDragging(true); try { e.currentTarget.setPointerCapture(e.pointerId); } catch (_) {} };
  const onMove = (e) => { if (start.current == null) return; setDx(e.clientX - start.current); };
  const onUp = (e) => {
    if (start.current == null) return;
    const d = e.clientX - start.current; start.current = null; setDragging(false);
    if (Math.abs(d) > 56 && n > 1) setPos(p => (p + 1) % n);   // send front below the stack; next rises
    setDx(0);
  };
  return (
    <div>
      <div style={{ position: 'relative', height: CARD_H, isolation: 'isolate' }}>
        {cards.map((it, j) => {
          const sp = (j - f + n) % n;                 // 0 = front, grows toward the back
          const isFront = sp === 0;
          const depth = Math.min(sp, 3);
          const tf = isFront ? `translateX(${dx}px) rotate(${dx * 0.03}deg)` : `translateY(${depth * 11}px) scale(${1 - depth * 0.05})`;
          return (
            <div key={it.id}
              onPointerDown={isFront ? onDown : undefined} onPointerMove={isFront ? onMove : undefined} onPointerUp={isFront ? onUp : undefined} onPointerCancel={isFront ? onUp : undefined}
              style={{ position: 'absolute', top: 0, left: 0, right: 0, height: CARD_H, background: T.card, borderRadius: 20, border: `1px solid ${T.borderSoft}`, boxShadow: isFront ? T.shadowLg : T.shadowSm, zIndex: 30 - sp, opacity: sp <= 2 ? 1 : 0, cursor: isFront ? 'grab' : 'default', touchAction: 'pan-y', transformOrigin: 'top center', transform: tf, transition: (isFront && dragging) ? 'none' : 'transform .34s cubic-bezier(.22,1,.36,1), opacity .34s ease' }}>
              <PriorityCard item={it} />
            </div>
          );
        })}
      </div>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6, margin: '16px 0 14px' }}>
        {cards.map((_, k) => <span key={k} style={{ width: k === f ? 18 : 6, height: 6, borderRadius: 999, background: k === f ? T.primary : T.border, transition: 'width .2s, background .2s' }} />)}
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 9 }}>
        <button className="tap press" onClick={() => onAction(front, front.primary.id)} style={{ height: 52, border: 'none', borderRadius: 14, background: T.primary, color: '#fff', fontSize: 16, fontWeight: 700 }}>{front.primary.label}</button>
        {front.secondary && front.secondary.length > 0 && (
          <div style={{ display: 'flex', gap: 9 }}>
            {front.secondary.map(s => <button key={s.id} className="tap press" onClick={() => onAction(front, s.id)} style={{ flex: 1, height: 44, border: `1px solid ${T.border}`, borderRadius: 12, background: T.card, color: isRed(s.id) ? T.redText : T.textSoft, fontSize: 14, fontWeight: 600 }}>{s.label}</button>)}
          </div>
        )}
      </div>
    </div>
  );
};

  // out of view; it shares `health`, so it fills live as items are completed.
  const scrollRef = useRef(null), healthRef = useRef(null);
  const [miniRing, setMiniRing] = useState(false);
  useEffect(() => {
    const root = scrollRef.current, target = healthRef.current;
    if (!root || !target || typeof IntersectionObserver === 'undefined') return;
    const io = new IntersectionObserver((es) => setMiniRing(!es[0].isIntersecting), { root, threshold: 0 });
    io.observe(target);
    return () => io.disconnect();
  }, []);

  const byModule = (mods) => ranked.filter(i => mods.includes(i.module));
  const groups = [
    { id: 'get_paid', icon: 'dollar', tone: 'accent', title: 'Get paid', items: byModule(['sales', 'quotes']) },
    { id: 'reconcile', icon: 'bank', tone: 'blue', title: 'Bank feed', items: byModule(['bankfeed']) },
    { id: 'expenses', icon: 'receipt', tone: 'amber', title: 'Expenses', items: byModule(['expenses']) },
    { id: 'assets', icon: 'layers', tone: 'green', title: 'Assets', items: byModule(['assets']) },
  ].filter(g => g.items.length > 0);
  const everythingCount = groups.length + 2; // + Liabilities + Key dates

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%', background: T.bg }}>
      <div style={{ flexShrink: 0, display: 'flex', alignItems: 'center', gap: 12, padding: '6px 12px 12px', background: T.card, borderBottom: `1px solid ${T.border}` }}>
        <button className="tap press" onClick={onBack} style={{ width: 40, height: 40, border: 'none', background: 'none', display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}><Icon name="arrowLeft" size={24} color={T.text} /></button>
        <span style={{ fontSize: 22, fontWeight: 800, color: T.text }}>Unibox</span>
        <div style={{ flex: 1 }} />
        {miniRing && !allClear && <button className="tap press" title="Business health" onClick={() => scrollRef.current && scrollRef.current.scrollTo({ top: 0, behavior: 'smooth' })} style={{ border: 'none', background: 'none', padding: 0, marginRight: 4, animation: 'fadeUp .25s ease' }}><HealthRing score={health.score} band={health.band} size={34} /></button>}
      </div>
      <div ref={scrollRef} className="screen-scroll" style={{ padding: '14px 14px 40px' }}>
        <div ref={healthRef}><HealthCard health={health} streak={progress.streak} /></div>

        {allClear ? (
          <div style={{ background: T.card, borderRadius: 18, boxShadow: T.shadowSm, textAlign: 'center', padding: '40px 24px', marginBottom: 14 }}>
            <div style={{ display: 'inline-flex', animation: 'ringpop .5s ease' }}><IconTile icon="sparkle" tone="green" size={64} iconSize={30} /></div>
            <div style={{ fontSize: 20, fontWeight: 800, color: T.text, marginTop: 14 }}>You're all clear ✨</div>
            <div style={{ fontSize: 13.5, color: T.muted, marginTop: 6 }}>Everything's actioned. Your business is in the green.</div>
          </div>
        ) : (
          <React.Fragment>
            {/* priorities — a swipeable card deck: swipe/tap to browse, act via the CTAs below */}
            <div style={{ marginBottom: 18 }}>
              <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', margin: '2px 2px 10px' }}>
                <span style={{ fontSize: 15.5, fontWeight: 800, color: T.text, letterSpacing: -0.2 }}>Do these first</span>
                <span style={{ fontSize: 12.5, color: T.muted }}><b style={{ color: T.text, fontWeight: 700 }}>{remaining}</b> to action{doneToday > 0 ? ` · ${doneToday} done` : ''}</span>
              </div>
              <SwipeDeck items={ranked} onAction={onAction} />
            </div>

            {/* everything else */}
            {!showAll ? (
              <button className="tap press" onClick={() => setShowAll(true)} style={{ width: '100%', border: `1px solid ${T.borderSoft}`, background: T.card, borderRadius: 16, boxShadow: T.shadowSm, padding: '16px', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 9, fontSize: 14.5, fontWeight: 700, color: T.textSoft }}>
                <Icon name="chevronDown" size={18} color={T.mutedSoft} />Show everything else<span style={{ color: T.mutedSoft, fontWeight: 500 }}>· {everythingCount} cards</span>
              </button>
            ) : (
              <React.Fragment>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10, margin: '2px 2px 12px' }}>
                  <span style={{ fontSize: 12, fontWeight: 700, color: T.mutedSoft, textTransform: 'uppercase', letterSpacing: 0.6 }}>Everything else</span>
                  <div style={{ flex: 1, height: 1, background: T.borderSoft }} />
                  <button className="tap" onClick={() => setShowAll(false)} style={{ border: 'none', background: 'none', color: T.muted, fontSize: 13, fontWeight: 600, display: 'inline-flex', alignItems: 'center', gap: 4 }}><span style={{ display: 'inline-flex', transform: 'rotate(180deg)' }}><Icon name="chevronDown" size={14} /></span>Hide</button>
                </div>
                {groups.map(g => (
                  <CategoryCard key={g.id} icon={g.icon} tone={g.tone} title={g.title} items={g.items}
                    renderRow={(it, i, len) => <ItemRow key={it.id} item={it} onAction={onAction} onMore={onMore} last={i === len - 1} />} />
                ))}
                <UCard icon="scale" tone="amber" title="Liabilities & equity" count={LIABILITIES.length}>
                  {LIABILITIES.map((l, i) => <InfoRow key={l.id} label={l.label} sub={l.sub} amount={l.amount} action={l.action} onAction={() => onAction({ ...l, __toast: `${l.action} — ${l.label} (demo)` }, '__toast')} last={i === LIABILITIES.length - 1} />)}
                </UCard>
                <UCard icon="calendar" tone="accent" title="Key dates" count="AU tax">
                  {KEY_DATES.map((k, i) => <InfoRow key={k.id} label={k.label} sub={k.sub} topRight={<Pill tone={k.tone === 'amber' ? 'amber' : 'neutral'}>{k.due}</Pill>} last={i === KEY_DATES.length - 1} />)}
                </UCard>
              </React.Fragment>
            )}
          </React.Fragment>
        )}
      </div>
    </div>
  );
};

// ---------------------------------------------------------------------------
// App shell
// ---------------------------------------------------------------------------
const StubScreen = ({ title, onBack }) => (
  <div style={{ display: 'flex', flexDirection: 'column', height: '100%', background: T.bg }}>
    <div style={{ flexShrink: 0, display: 'flex', alignItems: 'center', gap: 12, padding: '6px 12px 12px', background: T.card, borderBottom: `1px solid ${T.border}` }}>
      <button className="tap press" onClick={onBack} style={{ width: 40, height: 40, border: 'none', background: 'none', display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}><Icon name="arrowLeft" size={24} color={T.text} /></button>
      <span style={{ fontSize: 22, fontWeight: 800, color: T.text }}>{title}</span>
    </div>
    <div className="screen-scroll" style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', textAlign: 'center', padding: 32, color: T.muted }}>
      <IconTile icon="grid" tone="accent" size={60} iconSize={28} />
      <div style={{ fontSize: 17, fontWeight: 700, color: T.text, marginTop: 16 }}>{title}</div>
      <div style={{ fontSize: 13.5, marginTop: 6 }}>This screen isn't part of the Unibox prototype.</div>
    </div>
  </div>
);

const App = () => {
  const [tab, setTab] = useState('dashboard');       // active bottom tab
  const [screen, setScreen] = useState('dashboard'); // dashboard | unibox | invoices | expense | transactions
  const [drawer, setDrawer] = useState(false);
  const [items, setItems] = useState(SEED_ITEMS);
  const [activity, setActivity] = useState(SEED_ACTIVITY);
  const [allTime, setAllTime] = useState(42);
  const [toast, setToast] = useState(null);
  const [burst, setBurst] = useState({ n: 0, big: false });
  const [sheet, setSheet] = useState(null);
  const toastTimer = useRef(); const burstN = useRef(0);
  const progress = useMemo(() => computeProgress(activity), [activity]);

  const fireToast = (t) => { const obj = typeof t === 'string' ? { message: t } : t; setToast(obj); clearTimeout(toastTimer.current); toastTimer.current = setTimeout(() => setToast(c => c === obj ? null : c), obj.action ? 5000 : 2600); };
  const fireBurst = (big) => { burstN.current += 1; setBurst({ n: burstN.current, big: !!big }); };

  const completeItem = (item, message, kind = 'done') => {
    const idx = items.findIndex(i => i.id === item.id);
    const entry = { ts: Date.now(), kind, label: message };
    const nextActivity = [entry, ...activity];
    const prevToday = progress.today, nextToday = computeProgress(nextActivity).today;
    const prevTier = tierFor(allTime).name, nextTier = tierFor(allTime + 1).name;
    const remaining = items.filter(i => i.id !== item.id).length;
    let msg = message, big = false, note = null;
    if (nextTier !== prevTier) { big = true; note = `Nice work — you've reached ${nextTier}`; }
    else { for (const m of DAILY_MILESTONES) if (prevToday < m && nextToday >= m) { big = true; note = `${m} done today — you're on a roll!`; break; } }
    if (remaining === 0) { big = true; if (!note) note = "That's everything actioned — you're all clear ✨"; }
    if (note) msg = note; else if (prevToday === 0 && nextToday >= 1) msg = `${message} · 🔥 ${computeProgress(nextActivity).streak}-day streak`;
    setItems(prev => prev.filter(i => i.id !== item.id));
    setActivity(nextActivity); setAllTime(a => a + 1); fireBurst(big); setSheet(null);
    fireToast({ message: msg, tone: 'undo', action: { label: 'Undo', onClick: () => { setItems(cur => { const arr = [...cur]; arr.splice(Math.min(idx, arr.length), 0, item); return arr; }); setActivity(cur => cur.filter(a => a !== entry)); setAllTime(a => Math.max(0, a - 1)); setToast(null); } } });
  };
  const onAction = (item, actionId) => {
    if (actionId === '__toast') { fireToast(item.__toast); return; }
    if (actionId === 'preview') { fireToast('Opening preview (demo)'); return; }
    if (MATCH_ACTIONS.includes(actionId)) { setSheet({ type: 'match', item }); return; }
    const mode = MODE_FOR[actionId];
    if (mode) { setSheet({ type: mode, item }); return; }
    completeItem(item, directMessage(item, actionId));
  };
  const onMore = (item) => setSheet({ type: 'actions', item, onPick: (id) => { setSheet(null); setTimeout(() => onAction(item, id), 60); } });

  const openUnibox = () => { setDrawer(false); setScreen('unibox'); };
  const onTab = (id) => { setTab(id); setScreen(id); };
  const count = items.length;

  let body;
  if (screen === 'unibox') body = <UniboxScreen items={items} progress={progress} allTime={allTime} onBack={() => { setScreen('dashboard'); setTab('dashboard'); }} onAction={onAction} onMore={onMore} />;
  else if (screen === 'dashboard') body = <div className="screen-scroll"><Dashboard count={count} onOpenUnibox={openUnibox} /></div>;
  else body = <StubScreen title={TABS.find(t => t.id === screen).label} onBack={() => { setScreen('dashboard'); setTab('dashboard'); }} />;

  const darkStatus = screen === 'dashboard';
  return (
    <div className="device">
      <StatusBar dark={darkStatus} />
      <div style={{ flex: 1, minHeight: 0, display: 'flex', flexDirection: 'column' }}>{body}</div>
      {screen !== 'unibox' && <TabBar active={tab} onTab={onTab} onMore={() => setDrawer(true)} />}
      <MoreDrawer open={drawer} count={count} onClose={() => setDrawer(false)} onUnibox={openUnibox} />
      <Sheet open={!!sheet} onClose={() => setSheet(null)}>{sheet && <SheetBody sheet={sheet} onComplete={completeItem} onClose={() => setSheet(null)} fireToast={fireToast} />}</Sheet>
      <Snackbar toast={toast} onClose={() => setToast(null)} bottom={screen === 'unibox' ? 26 : 86} />
      <Confetti fire={burst.n} big={burst.big} />
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
